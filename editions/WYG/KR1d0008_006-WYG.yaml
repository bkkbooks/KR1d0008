  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0008_WYG_006-1a, image: WYG0092/WYG0092-0222c.png}
body:
  text: 太平經國書卷六宋鄭伯謙撰內外上論三官兼統內外或問小宰宰夫推廣太宰之法而聳動警飭百官府之治其於事則為宜而於勢則為順矣至於王宮之戒令政令則自有宮正宮伯以掌之王內之政令則又有內宰以治之而復預內事何也曰先王之制事權欲合於一而內外庭之勢本不容於分也宮中府中俱為一體余嘗於冢宰屬官論之矣若夫此二官之佐冢宰其所以通內外而合事權者則猶有可論者焉夫宮正宮伯雖曰掌王宮然不過宮中徒役之事子弟宿衞之職與夫諸官府之在內者耳其於后宮則初無所預內宰雖曰掌王內又不過以禮儀教王后夫人與夫九嬪世婦凡女寵近習之在左右者耳其於王宮之徒役宿衞則又畧不相闗各掌其一而遺其二勢既不能以相統而權亦不能以相臨統而臨之則惟太宰焉故宮正宮伯內宰皆𨽻於太宰而小宰宰夫皆佐太宰而兼掌其事職雖列於外而通於內權雖分於二而總於一自今考之曰建邦之宮刑曰治王宮之政令曰憲禁於王宮曰令修宮中之職事此王宮也凡宮之糾禁則王宮后宮無不在所掌也自其掌王宮也則兵衞郎衞凡宿衞之人皆領之飲膳衣服洒埽啟閉次舎幄帟凡供奉之人皆領之宮禁之秘藏王后世子之好用凡財用之司存皆領之其間多寡豐約用舍去取天子始不得以自私而小臣始不得以自便矣自其掌后宮也則六宮六寢無王內之限九御無女官之别詔其禮樂正其服位禁其奇衺稽其功緒其間損益増減採擇進御始有宴私玩狎之節而無侵竊感移之患矣蓋世未有家不齊而國可治者未有國不治而天下可平者太宰之治所以兼統內外而以小宰為始小宰之宮刑既以齊其家宰夫之朝法又已治其國然後太宰之邦典始可以治天下矣文王道化之行近至於汝墳逺至於江漢反而求之不過於后妃夫婦之際侍御僕從之間蓋其事存乎二南之風而載於穆王之命所謂刑于寡妻以御于家邦旦夕承弼厥辟出入起居罔有不欽而下民祇若者其道蓋如此也幽王不道二雅交譏而並刺之然皇父作相而內宰膳夫內史師氏猶得其人向使幽王不淫其色夫豈不能遏豔妻之煽巷伯之雅所謂萋菲成貝錦哆侈成南箕乃寺人之賢者傷於讒而為世徳下衰家法猶未盡壞若內若外若小若大猶遴其選而擇其賢有如成王周公親繼文武之志其事固可知矣是以論太宰之兼統內外當自小宰宰夫之齊家治國又自文王之家法始內外下論三官兼統內外或問周官之制內外庭固一體矣繼周如漢其制亦嘗有近於周者乎曰豈惟漢近於周雖秦亦然秦人變古不道無復先王之舊制然至於內外之相屬其事則猶有可言者外之九卿如少府猶得置尚書在內主發文書而掌奏下諸事外之三公如御史大夫猶得置中丞在內受公卿奏事而舉劾案章又外之三十六郡如監郡者皆是御史之屬為之猶得以天下之利害徑達於御史大夫而大夫徑達於天子漢興惟監郡之制變為部刺史若夫少府之尚書御史之中丞則一切因秦之舊而不改非因秦也蓋因周也尚書中丞非周制而曰因周何哉秦人雖變周之名而未嘗變周之意漢亦惟存周之意而不暇復周之名以百官公卿表觀之少府屬官自尚書而下有符節太醫太官湯官有東西織室有庖人三長丞有上林十池監以至中書謁者黄門鈎盾尚方御府永巷內者宦者皆屬於少府又復以私府永巷倉廏祠祀食官宦官分屬於大長秋御史大夫屬官有兩丞一曰中丞在殿中蘭臺掌圖籍秘書權尊勢重與人主親近事下中丞則中丞白之大夫大夫白之丞相是中丞在內丞相御史在外外得以統內也內領侍御史外督部刺史刺史掌奉詔例察州郡治狀黜陟能否以六條問事而奏事復上於中丞是部刺史在外中丞在內內得以統外也要之漢之官制三公九卿雖列職於外而皆有屬以在內以周官之遺意求之則丞相猶太宰也御史大夫猶小宰也御史之中丞少府之尚書猶宰夫也少府之下又有大長秋猶內宰也大長秋屬少府少府中丞屬丞相御史是秦與漢之制皆近於周之制也不特此也高帝之世御史大夫周昌嘗燕見奏事見高帝擁戚姬呂后之世審食其為相監宮中如郎中令公卿百官皆因之以奏事武帝之世丞相公孫𢎞亦得數宴見上或時不冠此雖非禮貌大臣之意然亦可以見其洞然無內外之限矣夫是以閹宦雖寵丞相猶得以檄召而詰責而大長秋中常侍猶參用士人而為之自武帝晚年宴游內庭不出不復與士大夫接用宦者主中書而典尚書之章奏尚書之官於是廢矣既以中書居中而受事又置諸吏居中而舉法故當時奏下諸事自中書逓送兩府自兩府下九卿自九卿下郡國而不由中丞中丞之官於是不得居中制事而內之侍御史外之部刺史併廢矣將軍列侯而下皆得加官而丞相御史獨不加名曰尊之而實疎外之於是丞相御史無復有至內庭者矣末年以霍光為大司馬而領尚書事宜若內外合為一然已非丞相職任儼然號稱內朝而併奪丞相御史之權昌邑之廢丞相楊敞不及與議不惟不得至內庭且不復預內庭之事矣夫宦官典中書之任中丞無制事之權三公無加官之號大將軍領尚書之職霍光告車千秋所謂令光治內君侯治外內外朝判然如此此漢治所由以盛衰也宣帝中興復遵漢初之制魏相為御史大夫外則遣丞相掾吏案事郡國而不遣使內則奏封事而不經尚書去副封而不令壅蔽加給事中而得宴見言事是以霍山方秉樞機相乃訟言其過杜延年居中用事相乃列奏其奸中外之政復合為一然猶未知復中丞之權元帝以來石顯用事丞相之權復去而盡歸於尚書哀平之際又歸外戚紀綱散壞内外不足以相統而西漢遂趨於亡光武懲外戚之用事憤大臣之竊命於是取三公之官以為閒職而取尚書及中丞專委任之以為臺閣之長以舉法歸中丞而以奏事歸尚書二官雖復用事然疏外庭而親内庭矣捨大臣而近小臣矣置三公而事歸臺閣矣變前世參用士人之制而專任奴僕薰腐之餘矣威靈之季御史之權盡移於尚書尚書之權又移於宦官尚書宦官合為一黨而宰相疏隔於外御史緘黙於內是以太尉楊秉奏侯覽而尚書召秉掾屬詰之曰設官分職各有司存三公統外御史察内當是時也御史豈真得以察內邪事權之失已乆小人徒借察內之名以自便耳蓋自古外內之不相屬未有若東漢之甚者也而其源實始於光武極其源而論之則又始於武帝使武帝不改漢初之制以三公九卿在外而以中丞尚書在內內外相屬而關節脈理相應則漢之制周官太宰之制也奈何快意於法度之外使内外事權分裂四出而不專領於大臣其末流遂以若此極也蓋嘗觀之自出納之要職不領於大臣而宰夫之官遂去為尚書中書之任尚書中書迭用事而霍光之權重𢎞恭石顯之事起尚書中書之形成矣自宿衞之親人不領於大臣而宮正宮伯之官遂去為光祿勲之任光禄勲之屬日益親而門下遂為省加官遂為司侍中遂為宰相矣自供奉之近習不領於大臣而膳夫而下掌次而上遂去為少府太常之任比其極也門下太僕之司又分為殿中省為內諸司使矣以至玉府財用之司既非大臣之所與聞則漢鴻都之賣爵唐瓊林大盈之名庫夫誰得而檢之女寵近習之嬖既非大臣之所與聞則母后臨政下令不出房闥國命寄之刑人或享專土之封夫誰得而制之此其源皆起於武帝是以其流至於不可救其禍反生於殺戮大臣而無顧忌之心事權之不合於一此宜太宰之所拳拳而小宰宰夫之所以佐太宰而兼掌其事也兼則治散則亂合則盛離則衰自三代以下其治亂盛衰之變凡幾見其變而復周官以救之此為治之大源太平經國書卷六
