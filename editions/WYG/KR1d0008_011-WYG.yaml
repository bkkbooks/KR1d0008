body:
  text: 太平經國書卷十一宋鄭伯謙撰㑹計上論司㑹以上七官或問周制天下之財皆受令於太宰而總於太府其玉府則專掌王之器物以共王之服食好賜其内府則受九貢九賦九功之貨賄良兵良器以待邦之大用其外府則專職邦布以待邦之小用至於司㑹則惟總其㑹司書則惟總其書職内則惟記其入職歲則惟稽其出職幣則惟振斂財幣之餘與夫司裘掌皮則又皆惟㑹計一物一用是自太宰而下其出納移用之權盡總於太府而司㑹至掌皮則不過糾察鈎考之而已然太府則下大夫為之長而司㑹則反以中大夫為之長司㑹之權反重於太府何也曰此聖人之深意也以㑹計之官稽掌財用財之吏苟其權不足以相檢括而為太府者反得以勢臨之則彼將聽命之不暇而何敢以究鹵莽而察姦欺鹵莽姦欺無所忌則沉匿掩蔽之弊生而匱乏枵虚之患至暴征横斂之原必自是而啓矣是以聖人必使之有相臨之勢以去其相黨之私然後理財之本末為可觀自今以司㑹而下考之所謂職内職嵗司書職幣司裘掌皮亦均之為理財也宜屬於太府而皆司㑹主之司㑹之權不重乎不惟此也太府頒其貨於受藏之府頒其賄於受用之府凡掌財用財者無不於太府受財焉而詔王及冢宰廢置乃司㑹主之司㑹之權不重乎抑又不惟此也司㑹司書皆一體也司㑹掌六典八法八則之貳司書亦掌六典八法八則之貳夫六典以治邦國八法以治官府八則以治都鄙乃宰相之職業而太宰之所以佐王者也貳之以小宰固其理勢之當然彼司㑹司書乃亦得而貳之司㑹之權不重乎夫惟㑹計之權重則糾察鈎考之勢得以行於諸府之中事不至於欺偽用不至於乾没數不至於虧耗國計不匱而功化無不舉推而至於典法則之處無不各行其所行大抵欺罔不生則財用足財用不缺則百度無所虧可以備威儀可以興文物車旌圭璧之器梓匠輪輿之度衣裳冕弁尊爵俎豆之禮上而郊天祀地下而師田行役冠昬喪祭皆可以並舉而無遺當其禮制樂作兵寢刑措而餘財餘力之效雖神祇祖考尤安樂之治道之治天下夫孰有廢而不舉者向使司㑹之於太府不敢論其曲直當否不敢抗其是非上下相蒙以為欺而彼此相容以為姦則不終日而匱乏隨之矣財力既屈國用蕭條下無以應無厭之求上無以充法式之用上下解散而禮樂庻事廢墜而荒落向之所謂六典八法八則太宰固不得而自行矣然則周家所以重司㑹之權者固將以助太宰之治也春官太史亦然鄭氏不深於周禮乃謂太府若漢之司農司㑹若漢之尚書不知漢以司農少府掌内外之材而尚書特少府之屬官耳糾察鈎考之權安得以其屬而行於其長也而後之儒者則又疑泉府倉人廩人掌泉榖之出入而不㑹計不知此三者之列於司徒特以其事近於民耳若㑹計則同出於司農而已且其致九貢九賦九功九式之財用所以於其入而㑹之也掌官府郊野縣都百物之財用所以於其出而㑹之也以其入而考其出所以參互而㑹之也百官之府百里逺近之郊三等之采地司㑹皆得以㑹之固不應若尚書之卑而法不及行於司徒之屬也先王建官之意深矣漢唐何足以知之漢興之初亦嘗少近於此以蕭何為相國而以張蒼為計相計相之權正周司㑹之職也命名曰相與相國並立其事權為甚重計天下之財而財不在其手其鈎考為甚分使漢終守此制而行之於司農少府之上夫誰曰非古然其遷計相也止於一月其更計相而為主計也又止於四歲自是而後主計之名與蒼俱罷矣司農少府各自受天下之財入而三公之屬又有倉曹以主倉榖有金曹以主鹽鐵貨幣又自分司農之財而有之而㑹計之官獨無聞焉遂使鄭氏猥以尚書而充之每觀文帝問一歲錢榖出入之數而平勃皆以為不知而請問治粟内史則知錢榖自司農之外無有能知其數者宣帝之世韓延壽守東郡放散官錢千餘萬是時蕭望之為御史大夫即遣御史詰問之自奏職在總領天下聞事不敢不問豈自計相罷後御史總領天下之財計邪是未可知也自光武歸禁錢於司農歸水利於少府歸鹽鐵於郡國意善而治不精故章和以後改司農平準為中準而列於内署而取少府之所掌尚藥太官御者鈎盾尚方考工諸曹列而為監又盡用奄人以領之不惟無稽考之官而士大夫亦無復有與財計者矣以至李唐此弊不革財雖掌於士大夫之手而糾察稽考猶未有執其權者且三司使之名一曰鹽鐵二曰租調三曰度支度支以相㑹計其名非不美也然當時三司獨設副使以三司使為之長則度支要是三司使之屬耳其官長治財而其屬考之於勢為不順宋朝三司使其屬官亦有磨勘司均之為失周官之意也渡江之後南庫令宰相提領雖稍異於他官之檢覈而内外不得以兼統矣然則因宋朝之磨勘司唐之度支使漢之計相而正之以周人司㑹之名使之權尊勢重以臨於三司之上而受令於三公之下國用其庶幾乎㑹計下論同上或問西漢自計相主計之罷司農少府分受天下之財倉曹又分司農少府之財利權散主漫不可考疑其為防甚䟽矣而當時之財物反以充羨東漢自光武歸鹽鐵之利於郡國并水衡之利於少府出少府之陂澤於司農司農以四時受郡國錢榖之數四方調度一切關請又有尚書以參互鈎考之利源始澄不相殽亂疑其為防甚密矣而當時財物反以耗散而不足何也曰東都之不足固其法之所宜有也宫中用度一切付之有司豈後世之所能堪尚書少府之屬耳焉有其官長理財而其官屬能考之者前二論已詳之矣此不必復論乃若西漢之所謂充羨亦不過一時取天下之財而聚之公上耳非有㑹計之法以通融上下之有無以均節財用之出入而至於有餘也食貨志言武帝之初承文景之後都鄙廩庾皆滿而府庫餘財京師之錢累百鉅萬貫朽而不可校太倉之粟陳陳相因充溢露積腐敗而不可食財物之浩穰漢之富庶於是為極矣然建元三年平原河溢民已相食何但若此廩廩也六十餘年之富庶曽未三年遽不足以支一朝之變乎蓋自賈誼晁錯勸文帝以蓄積均之為蓄積也誼則欲公私之兼足而錯則專剥民以厚君今年入粟於邊郡明年入粟於内郡郡縣之倉庾皆盈矣而民則無顆粒之餘平居無事猶以自造而不見其缺一旦旱乾水溢變起倉卒民則何以支此帝也哆然徒見其上之有餘而不知其下之不足外則窮兵黷武内則窮奢極侈公卿大臣曽無一人焉執均節之法以限制其方張之意至是則公私俱困矣竭四海之財不足以贍一人之欲財力既屈急征横斂生民復被其毒蕭然殆無以異於水旱之時也嗟夫舉天下之財而藏於國其斂之既無度舉國家所有之財而奉一人其用之又無節而其極也又不免暴征於民以寛其目前之計若是而猶曰西漢之財物充羨吾亦不知其以何者為充羨也况又有所謂鹵莽蔽匿之失乾没滲漏之弊千姦萬欺之轉移攘竊乎取之無度用之無節而㑹計之尤為無法蓋嘗觀之中尉設卒動數萬人王温舒樂安隱田幾四百頃康衡關東流民無名者四十萬石慶少府陂澤多為貴戚冐懇石顯版籍甚不明而口筭田租所入甚無定數也近稅武關以給守卒逺田車師以給過使上武紀下西域公車索米於長安東方朔掖廷出私錢以養宗室丙吉郎官出私錢以市財用楊惲劑券甚不明而廩禄所給甚無定所也㑹稽計籍三年不上嚴助内史假貸租多不入倪寛東郡官錢放散至千餘萬韓延壽乗傳而行郡國矯賦至六百萬賈誼課最甚不嚴而州縣所供甚鹵莽而無定期也乗輿賜竭取給大農食貨大農錢盡續以少府賈捐之平陵工作取諸水衡宣紀私用經費甚不常而緩急所移用甚紊亂而無定制也以至無額雜賦羨租之積尤為泛然無統如贖罪之錢儲於北軍江充無名之錢儲於郡内張安世卒吏之錢寄於州郡東海廩犧之錢寄於馮翊韓延壽軍市之租委於邊吏馮唐則其渙散尚有未易究者執掌之官吏出入之司猶存不聞有奉公亷平者糴邊榖百萬而虚數至六十萬斛趙充國僦民牛車而増價至三十萬田延年甚者或私僦賔客而入多逋負鄭當時則其轉移侵藉尚有未易悉數者蓋自漢家無計相之官公卿大臣無有能知錢榖之數是以人主肆其侈於上人臣肆其欺於下而民獨被其害於中以至於若此時也周家之所謂充羨宜不如此夫以漢去周之近使其參酌周制有書契版圖如司書則口筭田租何至於無定數有頒財受財如太府則劑劵稟給何至於無定所有九貢九賦九功之令財用有日成月成歲成之考出入則課最期㑹何至於無定期有玉府外府則經費私用必不至於紊雜有職内職幣則羨租雜賦必不至於渙散總而言之有㑹計之權如司㑹之重則凡百官吏又將不敢以容其姦欺奈何聚天下之財於公而聽君臣上下之各自行其私乎恣人以財而人無不貪猶飲人以酒而人無不狂也與人以利而人無不取猶飼馬以芻粟而馬無不食也周公創法肯若是其䟽乎周家㑹計之法所以為盡善者蓋不獨考其國之財亦將以併考天下之財也以司書觀之所謂知民之財者則諸府所受之貢賦必欲知其欠餘也所謂知器械之數者則執事官吏所用之器械必欲知其存亡也至於知田野夫家六畜之數則井田夫家有多而有寡牧野畜産有蕃而有耗無不考之知山林川澤之數則山林之材木有童而有殖川澤之蒲葦魚鼈有盛而有衰無不考之若其有餘則輸官之數必不容其虧若其不足則輸官之數必不取其盈蓋上下相通有無相濟合天下為一體而為之不若漢之判然不相關也論財物之充羨其本末源流要必如是而後可内治論内宰下十九或問内宰之職治王内之政令分其人民以居之内宫何以容人民之居處凡建國佐后市陳其貨賄出其度量淳制王后何以與市井之細事内小臣掌后之好事於四方掌后之好令於卿大夫婦人無外事何以外通諸侯而内交羣下内宰既掌宫中之祭祀而女祝又掌王后之内祭祀漢家尚除秘祀今女祝之設豈無執左道入宫而為厭禱者有府史胥徒有宦官宫妾數者混然淆亂雜居而錯處豈無為淫邪以汚宫壺者后夫人以下女嬪二十七世婦八十一女御自有定數也何以獨不著其數典婦功典絲枲追師染人屨人無非是人也而内司服縫人何以獨參之奄官以至春官有世婦矣而此又有世婦春官有司巫男巫女巫矣而此又有女祝春官有司服矣而此又有内司服冬官有鍾氏染羽矣而此又有染人獨不可併省而合於一也凡此十有九官之職事三等之官長其所議論者固不一也姑以是八者而言之則尤為可疑者曰子之所以為疑非以夫后與市事則内外為相紊人民官吏與宦官宫妾雜處則内外為相亂有外祭祀則内將有厭禱之事有天官等官又有春冬等官則内外猥多泛濫之職邪此正周公立國之規模維持之周密而措置之纎悉詳盡者不以通内外則以嚴内外者也夫以宫闕之尊嚴而與市井之猥賤以王后之秘密而行諸侯卿大夫之好禮以士大夫之自貴愛而雜奴僕熏腐之餘亦固幾於褻矣然家與國非異政王與后非異體内廷與外廷非有異勢也且王后之分隂陽之理相佐以相承者也王則立朝於前以先乎義后則立市於後以後乎利朝市何嫌於相關乎天子享諸侯王后則亞獻上公侯伯子男來朝夫人則致禮四方何嫌於有好事乎前有宫人之職中士四人下士八人掌寢處燕息沐浴櫛靧私猥之事而隱然厲其敗禮敗度之心後有典婦功等取中士二人下士十有二人掌衣服冠履之物而防人主奢侈之私用度耗費之漸以去其害國亂政之源士大夫何嫌於處内庭乎凡此無非所以通内外而同之也分其人民凡宫壼之執事室廬為府之在内者至於府史胥徒賈奄奚工女酒女漿女籩女醢女鹽女幂女奴女御則又自分而為内外天官世婦以廣嗣為義春官世婦卿也以掌女工之宿戒名同而官異則不得不分内外司服所以掌外朝之服飾内司服所以掌王后之服飾鍾氏染羽毛以充國之用染人掌絲帛以充王后之用内有不可以兼外者典婦功典絲枲之職雖用士人而内司服縫人之職則自用奄人外則有不可以至内者神所在而有之先王隨所在而祭之不惟以示忠厚不忘之心亦所以為交神明合三才之道故在内則有女祝在外則有司巫内外不敢互用也國君過市刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷是市雖立於后而過市之禁則極於嚴内外未嘗相雜也以至九殯世婦女御之不著其數亦所以嚴内官之選不茍於色不輕於澤以濁亂宫闈之内凡此又無非所以嚴内外而異之也蓋昔者先王之意以為内外不通則内外間隔藩牆有比鄰之異精神扞格而不通法令窒礙而不行利害相視而不相成非宫中府中一體之意至其一於通而不行之以嚴則又不免於尊卑之煩紊男女之濁亂職事廢弛而不舉知慮䟽略而不周者亦非辨方正位設官分職之意也天下猶人之一身也耳目口鼻各司其官而不相為用先王之所以嚴内外者實似之至於精神氣血之所以周流於一身者則未嘗壅遏而不相通先王之所以通内外者實似之周衰王制不明内外之政甚無足觀者朝市異路王后不同心椒房之重反挾蠱媚之道門庭閨闥之内尚不暇於整飭而况市井之細諸侯卿大夫之事乎妃嬪媵嬙列屋而望幸負寵而爭妍宫掖有醜惡之聲妃妾起巫詛之風官寺擅出納之權宦官宫妾相與亂其内而公卿大臣䟽隔於外莫有誰何之者矣究論所自則皆始於太宰之權去而内宰以下十九官之職不領於大臣也嗚呼大臣之權去内外之禍蓋有不可勝言者太平經國書卷十一
