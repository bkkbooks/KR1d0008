body:
  text: 太平經國書卷二宋鄭伯謙撰官民論三典官府萬民或問周有三公有六卿今太宰經理邦國其職則治官府而紀萬民事權之重如此其所以異於三公者如何也曰三公論道燮理而已不親治也況當是時三公既兼太宰則治之事權非太宰典而誰專之太宰建邦六典余嘗論之矣此不復述也太宰之所當論述者則其所主之百官萬民耳然太宰實專主百官司徒實專主萬民學周禮者茍得其說焉則二官節目皆可以迎刃而解也且禮刑政事之典均曰百官而獨於治典則曰以治官府以紀萬民於教典則曰以教官府以擾萬民變百官而言官府說者以為天地二官不拘其數所以尊之也是則然矣而未究其大㫖也周官之書曰冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民前有六典後有周官皆周公所作也六典則合官民而並職之周官則分官民而各掌之何也治道之要莫切於張官而置吏也官吏不職則治道為之不振立國之本莫切於愛民也民生不遂則國本為之不立是以太宰專主百官凡其八法之所治八柄之所馭歲終之所廢置三歲之所誅賞凜凜然有不可犯者故雖六卿各率其屬而趨事赴功之際聳動警飭而不敢不勉者無非所以奉冢宰之治也司徒專主萬民凡其十有二職十有二政十有二教三物之教五禮六樂之教斷斷然有不敢忽者故雖六卿各主一鄉而聯事合治之際纎悉𤨏碎而不敢不盡心者無非所以奉司徒之教也司徒太宰是以獨曰官府而小宰為之貳宰夫為之考一則曰官府二則曰官府也府之為言百官之所緫而萬化之所闗也雖然九職九兩太宰非無與於民也特紀綱其大者而已命鄉論秀司徒非無與乎官吏也特教養之於初而已六典合而言之周官分而治之二書蓋相為表裏也成周之治大抵自上而達於下自内而推於外端本以澄源詳近而略逺故六卿各主一鄉一公則率二卿且太宰司徒當時既以二公兼之其外四卿意當時亦必以此二公率之一以率畿内之官一以率畿内之民本立於上而末自舉於下治教行乎王畿之近而若吏若民自風動乎四方萬里之逺所謂正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一於正天下之大舉無異乎一堂之上所謂行法自貴始王化自近始建首善自京師始其道蓋如此也周衰此意不存六卿分職不足以倡九牧而阜兆民邦畿千里不足以正萬民而假四海亂𤼵於上而禍及於下本實先撥而枝葉受其害成王周公體國經野設官分職以為民極之政靡有孑遺矣夫世未有誅賞不行於百官而能使百官戒懼不敢易紀律者未有生聚教訓勸相勞來不加於民而能使海内革心易慮以聴上之所為者穆王欲興文武成康之治雖未見其能復還太宰之職而命君牙以為周大司徒又命伯冏以為周太僕正而正於羣僕侍御之臣考之周禮太僕傳言於宰夫而宰夫聽命於太宰此不可謂不知本矣厲王板蕩無綱紀文章陵遲至於幽王厲階之生實起於二官之失職故家伯維宰畨維司徒詩人疾而刺之而十月之交之詩所以作也然則後世欲復成周之治當先治官與教民欲無一官之不職無一民之不善當先復太宰與司徒官刑論官府都鄙法則或問周官一書成王所以勸其羣臣者寛厚温和惟恐其或傷周禮之一書成王所以御其羣臣者嚴厲督責惟恐其或敗我事何也曰勸之之辭徒詳而治之之法不繼則無以聳聽而起其怠人情於此亦未必有退聽而從命者是故内而官府凡治教禮刑政事之屬外而都鄙凡王子弟公卿大夫之衆皆有法則以治之蓋貴有常尊賤有常卑賤者不嫌於無法故未嘗忘教貴者不嫌於無教故行法必自貴者始夫是以官刑之所糾官計之所弊舉辨㑹聽經正之别刑賞禄位廢置之馭凜若秋霜隱若雷霆不可犯也曰法曰則其名雖異其用則同而或者以為詳法而略則所以詳内而略外猶禹貢綏服三百里曰揆文教要服二百里曰蔡也噫先王之治天下固有詳略之不同而千里之王畿三等之采地未遽略也八法以治官府既見於太宰而六叙六屬以下復述於小宰是官府之治固詳也宰夫掌治法以考百官府郡都縣鄙之治司㑹掌六典八法八則之二以逆邦國都鄙官府之治則都鄙之治豈得以為略乎且獨不見祭祀以馭神乎先王設禮樂教化刑罰慶賞不獨以經理其生民雖幽而鬼神無不及焉是故順成之方八蜡乃通有功者無不報也犧牲既成粢盛既潔旱乾水溢則變置社禝無功者不可奪也彼其幽而無形深而不可考曖昧恍惚而難及以政者先王不敢不致其詳焉而况於為吾之官吏乎是故都鄙之治所謂法則以馭其官者即官府之八法也所謂禄位以馭其士者即官府之六叙也其餘廢置刑賞莫不皆然觀先王之治都鄙夫亦自其所難及者而觀之耳日月寒暑堯秩叙而賔餞之江河淮海禹䟽導而平治之天地之大也先王猶及以政曾謂官府都鄙而遽有詳略之分乎謂詳法而略則詳内而略外不能觸類而觀之者也不足與論先王之治攬權論八柄八統詔王或問太宰主羣吏司徒主萬民而吏民之事太宰又得以兼行之天下萬務無不在掌握中而八柄馭臣八統馭民太宰必以詔王何也曰凡邦之小治則冢宰聽之柄謂權柄之大也統謂統御之大也出乎法令之外而行乎操縱闔闢之間是非人臣之所得為也蓋聖人之道有經有權經者法之常而權者法之變使聖人之為天下一切聽於法而無操縱闔闢之權以變通之則吾之爵禄生殺有時而竆而人情取必之餘亦有時而玩是非可常之道也故自八柄而言之有徳者宜貴也或無爵而未貴有功者宜富也或無禄而未富非所可予而有私恩之施以為幸非所可赦而有私義之免以為福置之尊貴而使自愛奪其榮富而使貧窶罪重於過而或止於廢過輕於罪而或抵於誅此皆人主之所用以為聳動天下之具而不使人有自必之心者也自八統而言之親故賔客固當敦敬而尊禮賢能勲貴固當任使而保䕶然恃恩者常易驕恃才者常易傲而服勤盡瘁之士亦不能無累日取貴之心今也親親未巳而賢賢繼之尊尊貴貴未巳而下下繼之内朝序齒忽變而序爵於外朝投壺燕射序賢或變而序官於宗廟不拘於一而迭出於八此又人主之所用以為轉移變化之術而不使有自恃之心也施不測之恩用不測之威我可以取必於人而人不可以取必於我使一世之人皆有以奔走而畏慕而不得以邀持而固必暫出於我而天下之人被之者鼓舞而喜慘怛而悲此豈非權柄統御之大者乎太宰雖尊人臣也如使人臣而亦得以擅權柄專統御擺落乎法令而雜用乎經權則繩墨廢而法守亂末流之弊將至於蕩然自肆誣上行私之人皆得藉口以專其欲矣周公所甚慮也其大者歸於王而其小者則守於冢宰其權而變者歸於王而其經而常者則守於冢宰若内府供王之好賜予及冢宰之好賜予此好賜予之常者也若司㑹以周知四國之治以詔王及冢宰廢置此廢置之常者也若小宰之六叙以正其位以置其食此禄位稍食之常者也若表記言周人之親而不尊祭義言周人貴親而尚齒此親親之常者也太宰守其常故其待百官萬民有一定之法人主用其權故其疾速進退皆在我而百官萬民不得執法以要其君雖然權固人主之所得用也而必待太宰之詔此亦慮其所終而稽其所弊矣君相之間相濟而相維持者如此成王周公之世王朝之上所以無一官之不盡其職而王畿之内所以無一民之不入於善也蓋天下之人見太宰必然之法則不敢以不自盡見人主或然或不然之權則内不敢以自恃外不敢以自必激昻振厲惟知自強於為善而已昔者嘗觀諸夏商與齊魯之事則大異於周矣蓋夏后氏先賞而後罰親而不尊其民之敝至於惷而愚喬而野朴而不文商人先罰而後賞尊而不親其民之敝至於蕩而不靜勝而無恥及太公治齊舉賢而尚功周公曰後世必有簒奪之臣周公治魯親親而尊尊太公曰後世浸衰矣蓋齊之所為無以異於商而魯人之治則夏后氏之治者矣用必然之賞用必然之罰必親親必尊尊必舉賢而尚功取其一定者而固守之其末流固至於此此宜周公之所懲也為之定法以自守於其下使人主時用其意而操縱闔闢於其上上下相與出於必然不然之中然後可以振厲人心於無窮太平經國書卷二
