body:
  text: 太平經國書卷三宋鄭伯謙撰養民論太宰九職任民或問先王井天下之田分天下之民凡民皆受田凡受田皆為農而太宰之九職三農九穀之外又有園圃虞衡藪牧工商嬪婦之民未免有農末之分何也曰此即受田之民為之非其餘力則有餘夫也至於臣妾則男或一夫女或一婦既不可以受田於公家其勢必服役於私室先王於此則使之聚斂疏財以取其利若九兩之主以利藪以富是也茶以供喪事茅以供祭祀芻茭以飼國馬今時人取草以飼牛取萍以飼犬豕負冰拾髮竹頭木屑皆疏材之屬者也閒民則私田九一之餘公田十一之外既不從事於園圃虞衡藪牧之地又不從事於工商嬪婦之業先王於此則使之轉移執事以共其利若司徒之生材里宰之鋤粟是也蓋嘗因事論之以為先王與民為生後世則民自為生至於今世民無以為生矣夫與民為生吾不敢以望後世矣而聽民之自為生獨不可乎不聽其自為生而至於無以為生民病則極矣而暴君汙吏又從而朘削之征科色目百出而未巳日夜疾視其民而斂之若讎不至於貧蹙潰散則不止則夫無以為生之民於是有輕用其生者矣非復有依依不忍去之意於垂亡臨絶之餘如先王之季世也嘗觀周之先王其所以與民為生非一事也井九百畝其中為公田八家皆私百畝使之相養相生如是足矣為之比閭族黨州鄉為之鄰里鄼鄙縣遂為之溝洫澮川畛塗道路以安其生為之禱祠醫藥之政為之賙救補助之法以衛其生如是又足矣而猶以為未也謂王畿之內皆齊民而未有特富者生生之具雖以粗給而祭祀喪紀猶有所不足而取於常數之外於是九職之任頒焉雖臣妾閒民皆不敢遺而亦必有以厚其生當是時也豈復有農者一而食者六工者一而用者六賈者一而資者六乎思慮周密安養生利備至蓋不措之於仰事俯育無憾之地則鬱鬱然如有負於斯民也反復太宰之九職未嘗不三歎先王之政以為先王孜孜為民之心即後世孜孜為已之心轉移而為此此民所以樂其上之愛已而忘其勤於是相與出其賦稅以供其上稅以足食賦以足軍國之用而先王猶不敢泰然而享之斗粟尺帛則有司存鉤考㑹計猶恐其用之妄問有水旱不登則焦然凛然念民生之不易禍至之無日捐租出粟欲減膳而不御樂矣夫其與之也甚厚取之也甚薄而用之也甚嗇民知上之與已者至故其所以奉上者亦至非若後世之徒取而徒與也自井田壞而貧富不均上之人猶不能制民之常産況敢望其九職之任乎而民始自為生矣有父子兄弟夫婦之聚而無衣食生養之資窮居蹙處不自聊賴去而為工技散而為商賈不得已而為庸保而民之為生始勞矣迫之以水旱役之以軍旅困苦之以疾病死喪而民始無以為生矣不反其本方更圖易令以求豐財上之公卿大夫下之百司庶府中外之學士大夫日夜講求理財之策民何以足而國何以堪邪先王之事吾誠不敢以望後世矣無已則聽民之自為生乎稅賦論太宰九賦九貢或問畿外有貢畿內有賦有稅有征斂之目其别如何曰公田以為稅私田以出賦征斂則稅賦之總名家征力征則以一家餘夫之力言之夫征地征則以一夫私田之賦言之若畿外諸侯則食公田之稅以為祿幹私田之賦以為貢耳學者於貢賦稅之說何其紛紛也愚請略公田之稅而姑論畿內之賦次及於畿外之貢然後紛紛之說可以盡折而一之人徒見夫稅以足食賦以足兵則以民賦為止於兵車以九賦為諸臣祿田之賦非也稅賦雖一而賦有三凡起徒役毋過家一人此兵賦也甸出長轂一乘此車賦也一曰邦中二曰四郊而下此九等之賦也時方有事則農出一兵甸出一車事已則兵還於農車還於甸雖名為賦其實則使民自為衛耳有以足軍之用而未有以足國之用也國之大用有祭祀有賔客有喪荒羞服有工事幣帛有芻秣匪頒好用不取諸民於誰責而供之於是始助百畝之私以制九等之賦勸九職之任以代九賦之出今考之周禮國中四郊之賦閭師征之野之貢賦縣師征之委人征薪芻木材獸人㕓人收皮毛筋角角人斂齒角羽翮丱人收金玉錫石澤虞取國澤財物掌葛掌染草則征絺綌染草以當邦賦掌炭掌荼則征灰炭茅莠以當邦賦其始也以九穀為主而其終則皆以九職之物充賦其始也以五等定輕重而其終則皆以年之上下出斂法熟讀一書其所以孜孜於田賦之說者蓋以其未始立法也若公田十一之稅周禮曷嘗一言之豈惟公田太宰九等之賦不言軍旅亦以一兵一車之出自有定制耳此自黃帝為井牧以來未之有改彼則自周公之身而經始之色目常慮其巧立輕重常恐其過差有無常患其相違受用常憂其相亂是以太宰正其名載師酌其數閭師縣師隨其物太府謹其待用蓋其終始本末無毫髮不經思慮者達之王畿之外則有異名而無異法諸侯食其稅於國則稅之名變而為祿諸侯納其賦則賦之名變而為貢始於太宰之致其用中於司馬之制其賦終於小行人之令其獻考之職方氏自揚之金錫荆之丹銀以至并之布帛此即取物以充賦也又考之大行人自侯服之祀物甸服之嬪物以至要服之貨物此即變賦以為貢也其纎悉委曲則與畿內無一不相應者蓋嘗以禹貢之書考之然後周禮貢稅賦之别源流㑹通益無可疑者夫冀州在王畿之內堯之所都也厥賦惟上上厥田惟中中是公田之稅雖其等在五而私田之賦折以他物則其等實在一也此乃太宰之九賦也八州在王畿之外諸侯之國也田賦之下於是始立為貢篚之制焉有金木鉛石之貢有漆絲羽毛之貢有球琳琅玕銀鏤砮磬之貢此則太宰之九貢也然禹貢與周禮少異者周禮畿內之類通可以言貢而禹貢則專指以為賦禹貢畿內之賦專以米粟之屬而周禮則雜以他物代之此特其微異者耳不害其為同也周衰王制不明貢稅賦之法不復存成王周公之制魯之宣公初稅畝是以公田之外復履私田之畝行十一之稅雖然賦則尚無恙也至於成公之作丘甲則每三甸而加一乘兵車之賦非復司馬法之舊哀公之用田賦則受田百畝而出賦二十畝私田之賦非復載師之舊至於邦國之貢益悖謬而無統包茅不入王祭不共是諸侯既不致貢於天子子産言鄭伯之男而使從公侯之貢見昭公十三年是晉人責貢於諸侯者又難給焉此豈惟非周家之舊法哉虞夏貢賦之法自三代以來所謂相承而不廢者至春秋而掃地矣嗚呼讀周禮見周之所以盛讀春秋見周之所以衰節財論九式均節財用或問王制之書言冢宰歲杪制國用此九賦九貢之後亦有九式以節財用冢宰與王論道經邦者而區區於理財用之末何也曰君心之非莫大乎侈心之生財聚於公上而大臣不敢撙節於其間則府庫之充牣財物之浩穰而人主之宫室器用服食賜豫一切始無度矣是固蠱壞心術之大源而以道佐人主者之急務也余嘗論冢宰屬官以為內外庭宿衛之士士之賤者也烹庖饔膳之事事之辱者也魚臘酒漿醯醢之物物之微者也次舍幄帟喪服為末用宦寺嬪御灑掃使令為冗役而宴私玩狎之際易以惑悅人主之耳目而侵竊大臣之權柄是以冢宰一舉而盡握之此固一說也然而府庫之財物國家之耗費亦莫大乎是數者之間使太宰身不得總其人心不得約其用則多寡豐殺去取用舍損益之目誰得而檢之秦漢以來散無統紀武帝窮奢極侈尤為無度衛士已三萬人而郎衛之外又增置期門羽林南北軍之外又增置八校尉無復多寡之節少府掌山海池澤之稅以充天子私供養大官七丞主膳食湯官主餅餌導官主擇米庖人主宰割無復豐約去取之制黃門給事禁中鉤盾掌苑囿尚方作禁器御府主衣服掖庭永巷亦置八丞上林池籞多至十監無復用舍損益之限北至朔方東封泰山所過賞賜用帛百餘萬匹金錢以巨萬計縣官空虛而吏始坐市列肆販物求利矣異時元帝在位雖號溫恭少欲而齊三服官作工各數千人一歲費數巨萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬東西織室亦然廏馬食粟將萬匹此御史大夫貢禹所以拳拳獻忠願減諸離宫及長樂宫衛之大半太僕減食穀之馬水衡減食肉之獸省宜春之苑罷角抵之戲復齊三服官之舊而還高祖孝文之節儉也雖然禹徒知有高祖孝文之節儉而豈知有太宰九式之均節邪以周禮考之膳夫歲終則㑹惟王及后世子之膳不㑹庖人歲終則㑹惟王及后之膳禽不㑹酒人歲終則㑹惟王及后之飲酒不㑹又內府歲終不㑹王后之服司裘歲終不㑹王之裘服夫一歲之財有限而司徒所以制一歲之入冢宰所以制一歲之出者亦有常令而㑹曰不㑹豈真使王后世子得以自便而自取邪彼賤有司也以區區賤有司而與至尊較出入之是非計用度之當否則於勢為不順於事為難行是以上取之而下供之而多寡豐殺去取用舍損益之數則自有九式存焉吾何與知而與至尊者較曲直取與邪是故好用匪頒吾則共之芻秣幣帛吾則共之工事羞服喪荒賔客祭祀吾則共之以至向之所謂賤士辱事微物末用冗役吾又一切共之而一曰祭祀之式至九曰好用之式太宰則總持之夫惟財共於有司而式法持於太宰是以人主不敢違式法而過取百官有司於此亦不敢至於違式法而過共宰夫以式法掌祭祀酒人以式法授酒材掌皮以式法頒皮革委人以式法具薪蒸木材職幣以式法斂幣餘職歲以式法贊逆㑹太府以式法頒貨賄人主之私心以式法而礙則侈心以式法而銷國用不屈民力不匱而玉府之財用始沛然有餘而論道經邦之地始造原立本於此而無以蠱壞之也或曰小宰之職以法掌祭祀朝覲㑹同賔客之戒其軍旅田役喪荒亦如之七事者令百官府共其財用今九式之中乃不及朝覲㑹同軍旅田役何也曰朝覲㑹同之用不過牢禮委積膳獻飲食賔賜飱牽而已此則賔客之式也軍旅田役之用亦不過幣賫委人共委積薪芻司勳掌賞地宫正頒衣裘車人矢人繕人稿人司弓矢司甲兵之數一切皆有法式以給其財此則幣帛芻秣匪頒工事之式也或又曰軍旅田役莫大於餱糧而不為之式何也曰居者積倉行者裹糧人自為具非公家之所給也公家之所給惟官府中供軍士者耳此則有廩人治師役之糧食倉人共道路之穀食遺人掌道路之委積是不為無法也大抵太宰之所謂理財惟急於理其出而已蓋財多則下之用者易失之滲漏上之取者每患於過差九式之法不過以撙節人主亦以隄防百官有司之失物辟名也式法不行而後上下始交征利矣錙銖而取泥沙而用竭九州之財不足以贍一人之欲而公私始俱受其病矣嗚呼是其所以為秦漢矣太平經國書卷三
