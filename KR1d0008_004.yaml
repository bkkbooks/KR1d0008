  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0008_WYG_004-1a, image: WYG0092/WYG0092-0211a.png}
body:
  text: 太平經國書卷四宋鄭伯謙撰保治論九兩繫邦國得民或問九兩之中曰牧者君也曰長曰主曰吏者官也彼其分君之職居民之上凡可以助君而得民者固其分也有如師儒之間宗族朋友之際山林藪澤之豪豈常有位於朝有祿於國者邪而均之曰得民與牧長主吏並立而相參何也曰此先王防患之深意也夫千里王畿之外公侯而下伯子男而上其君皆牧伯也千里王畿之內近而鄉遂逺而都鄙其官皆長吏也三等采地之間卿之有邦縣公之有邦都其人皆主也牧伯皆有分地則其地大有以服民公卿各有采地則其利入有以得民長與吏雖有祿而無地然既食其祿則民亦有以尊其貴既專其政則民亦有以悅其治蚩蚩之民其聚必以類其分必以羣為之兩則渙散四出而其勢不可合矣是以牧長主吏先王各使之繫其民而聽其兩不可縱也不聽其兩則其勢將至於渙散聽其兩而從其得民他日有懷詐挾邪之諸侯傾側擾攘之士出於其間則逆節之萌禍心之包藏其將何以制之先王於是有師儒朋友宗族豪富之兩以參互於其間是九者相與為兩而後邦國之民有所耦合有所耦合而後有相訓相保相及相共相利相安之道昔者孔子孟子以布衣匹夫而衣冠禮樂足以師表一世其門人弟子不逺數千里而從之雖飢寒流落濱於死而不去此師以賢得民也庚桑子居乎畏壘而畏壘之人相與尸而祝之社而稷之陽城居於晉之鄙人薰其德而善良者幾千人此儒以道得民也商之七族宋戴武莊之族齊諸田楚懷屈率以強宗大族更相維持繫屬人心若漢郭解之遊俠輕財重義出萬死一生以救人之急而任之事則民心爭慕而惟恐或後蜀卓氏孔氏程鄭刁間之徒占山林藪澤之利殖貨纍巨萬而富比封君隱民皆取食焉此三者以族以任以富而得民也九者各有以得民之心各有以聯民之族類相恱而相附相制而相維持故彼動而此禁一萌則一揠先王經理邦國之大意隱然可見於此後世王制不明是九者雖未嘗不兼有而為治者不知也徒為之牧長為之主吏而所謂師儒朋友富家大族未嘗過而問焉是以越雪蜀日吠噬狂走上之人不以為意而師之得民者廢溺冠騎項之餘俳優侏儒爭以儒為戲而儒之得民者廢禁遊俠破黨伍而朋友之得民者廢誅鋤強宗遷徙大族嫉惡州縣之富室而宗族豪右之得民者又廢五者盡廢而牧長主吏雖存又皆割人以自奉役人以自安耳州縣之守令大抵以辦財賦為職而得民之道百郡千邑無復一人經意矣秦漢以來牧長主吏之間如有畨令吳芮南海尉他才得江湖嶺海之人心遂起而王其地魏其武安以招致賓客之勢而傾動天下吳王濞擅山海之利賦不及民拊循招納而山東七國之變相挺矣士不考論後世之變而能見太宰九兩繫民之説則孰知先王防患之意深考課論三官申明考察太宰正月之吉始和布治於邦國都鄙乃縣治象之法於象魏使萬民觀治象挾日而斂之司徒司馬司空皆然乃施典於邦國而建其牧立其監設其參傅其伍陳其殷置其輔乃施則於都鄙而建其長立其兩設其伍陳其殷置其輔乃施法於官府而建其正立其二設其考陳其殷置其輔凡治以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賓客之治歲終則令百官府各正其治受其會聽其致事而詔王廢置三歲則大計羣吏之治而誅賞之小宰月終則以官府之敘受羣吏之要贊冢宰受歲會歲終則令羣吏致事正歲帥治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑乃退以宮刑憲禁於王宮令於百官府曰各修乃職考乃法待乃事以聽王命其有不共則國有大刑宰夫歲終則令羣吏正歲會月終則令正月要旬終則令正日成而以考其治治不以時舉者以告而誅之正歲則以法警戒羣吏令修宮中之職事書其能者與良者而以告於上或問太宰之職自六典佐王而下九兩繫民而上凡此十者經國之大綱為治之條目既兼舉而並行之矣今正月之吉乃始和而布之正歲之月乃始垂而觀之邦國都鄙官府之中乃始施其治牧監正二之屬乃始建其人何也曰此所以申明吾之法也歲終三歲將有以考課其人正月正歲不得不有以申明其法蓋慢令而致期不戒而視成先王猶不敢以施諸民而况於其官吏乎未嘗警戒之而遽置廢誅賞之平時既無以起其怠而策其進一旦亦無以示其信而愜其心先王不為是也舜相堯二十有八載矣而正月元日四嶽四門之詢闢四目四聰之明達十二牧之咨二十二人之戒猶諄諄然命之者是固將以為考績之地也夫是以前黜陟而去四凶天下至於咸服後黜陟而分三苗庶績至於咸熙三代以來世守此道每歲孟春遒人以木鐸徇於路官師相規工執藝事以諌其或不共邦有常刑在夏為遒人在周即為小宰木鐸未徇則常刑終未施也廢時亂日之人承命徂征之舉至此何所逃其罪邪成湯制官刑以警有位廣五子之訓以為三風十愆之戒使瞽矇之士具其訓而揚之異時記禮之書考論夏商之制則其本末猶有可言者孟冬之月命太史是察阿黨無有掩蔽命司徒循行積聚無有不斂命工師效功功有不當必行其罪命水虞漁師收水泉池澤之賦其有敢侵刻行罪無赦此所以考課之也季冬之月則曰天子與公卿大夫共飭國典論時令以待來歲之宜孟春之月則曰乃命太史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常此所以申明之也由是言之夏商以來所以考課其人則在於孟冬所以申明其法而重為他日考課之地者則以季冬以孟春是唐虞平在朔易之意而周人之所以依倣而行之者也蓋周人考課之法尤嚴於唐虞三代之舊考之周禮有所謂逆其治者執吾之法而逆警戒之於其先也小宰司會司書女史職歲職內鄉師太宰內史是也有所謂待其治者既警戒之則待其成而考驗於其後也太宰以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賓客之治如宮正醫師司會大司徒小司徒鄉大夫遂大夫族師黨正鄙師內史司寇士師之屬則皆所以考其事如宮正膳夫酒正大府職內司會司書內宰典枲泉府繕人稿人之屬則皆所以考其財如太宰小宰宰夫則兼統而並考之故日之有成日考之也宰夫受之月之有要月考之也宰夫令之而小宰受之歲之有會歲考之也小宰贊之而太宰受之三歲之有計三歲考之也冢宰贊之而王親受之曰計曰會曰要曰成散見於三百六十官之中自宰夫而下酒正則日入其成月入其要司會以參互考日成又以月要考月成又以歲會考歲成而司書則入要二司徒則正要會鄉師則受役要與夫司馬士師亦皆受而正之蓋有官則必有事有事則必有考人與官不相違功與法不相悖則置之賞之其官則然其人則不然其法則然其功則不然則廢之誅之太宰既已三歲計吏而誅賞司士亦三歲稽士而進退非一切委之以法而聽其人之自縱也以王制參觀之司會質成三官則從司會冢宰贊天子受質三卿則以百官之成質於天子案王制曰天子齋戒受諌司會以歲之成質於天子冢宰齋戒受質大樂正大司寇市三官以其成從質於天子大司徒大司馬大司空齋戒受質百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官齋戒而受質焉六卿皆與考績而冢宰獨操其柄然王制特舉其略而周禮則備見其詳條目為甚悉其八枋之所施凜凜乎甚嚴也周人考課之嚴如此豈遽行其法而逆責其效也哉其本末源流固自有次第非汲汲焉於朝夕之頃者蓋曰成曰要雖不廢於日月而會計之大則必遲遲於一歲三歲之終申明警戒之嚴必勤勤於正月正歲之始蓋自六典八法八則其正在太宰太史司書其二在小宰司會九貢九賦九式其正在太宰司會其二在小宰太府賜豫則掌於宗伯修法則掌於匡人司寇執典法以斷匡人達法則以觀其慝太宰張其紀綱於上而六卿羣吏相與理其條目於下法之所在固已彰彰於人之耳目不可違也先王於此必謂夫人之情常以久而懈怠法之意常以久而玩弛是以每歲輒申明之在太宰則正月始和挾日而後斂在小宰則正歲帥治官之屬觀治象之法而懼之以大刑在宰夫則正歲以法警戒羣吏令修宮中之職事而勸之以良能以至大司徒正歲帥屬觀教而鄉大夫州長黨正亦考而讀焉大司寇正歲帥屬觀刑而士師亦憲而禁令焉凡昔者經國之大綱為治之條目燁燁然常有日新之意奉行之吏聯事合治之人欣欣然常有日新之功由太宰終篇觀之乃施典則於邦國都鄙是所立之法常若始立而施之也建其牧而立其監建其長而立其二是所用之人常若始建而立之也法若始立之法人若始用之人戒飭勉厲之餘有奮發而無懈怠有敕正而無玩弛能否畢見賢不肖無所隱至是而考績之法始可以行小而豫奪大而生殺始可以各當其情也故太宰於正月正歲之後既斷斷然行其誅賞於歲終而小宰宰夫於歲終已誅賞之餘又昭昭然揚其禁令警戒於歲始始終之相因勸戒之相仍王朝之上所以無一人之不善其職歟且不獨待其人為然也制而用之謂之法推而行之存乎人人不能皆善既已因法而廢置法不能無弊則亦為之隨時而損益者也可否之相濟猶五味之相和於是時也先王猶恐法令出入之際有以亂人聽而未孚乎人之心於是正月和而先布之於正歲終而申飭之况乎考課之法將以明人之功而正人之罪豈得不遲之於一歲三歲之終乎督之迫者課反易考而待之寬者責每難酬也雖然夫子嘗曰茍有用我者期月而已可也三年有成又曰如有王者必世而後仁是紀綱可以定於期月之頃而治功可以成於三年之後考績之法固可以行於此時也若夫舉一世人心皆安行乎大道之中而無所事乎上之誅賞是非必世焉不可也此又周禮言外之意成王周公之所自知也學者當因吾夫子之言而求之周禮太平經國書卷四
