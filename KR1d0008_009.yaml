body:
  text: 太平經國書卷九宋鄭伯謙撰愛物論鳥獸魚鼈昆蟲或問天官有獸人掌罟田獸冬夏獻狼麋春秋獻獸物有䱷人鼈人掌以時䱷為梁春獻王鮪鼈蜃秋獻龜魚則凡鳥獸蟲魚之瑣碎三人皆可兼之矣服不氏之教養猛獸射鳥氏之敺射烏鳶羅氏掌畜之網羅馴擾何以復見於夏官冥氏設弧張為阱擭以攻猛獸庶氏除毒蟲穴氏攻蟄獸翨氏攻猛鳥硩蔟氏以方書去夭鳥剪氏以禜莽草除蠧物赤叐氏以炭灰除貍蟲蟈氏以牡蘜去鼃黽壺涿氏以牡橭象齒殺淵神庭氏以救日月之弓矢射夭鳥何以復列於秋官若曰天官所掌惟畜獸魚鼈以供王飲膳之物耳而禽獸之屬昆蟲之類所以為害於國中者不暇及焉彼服不氏之所養與其所共冥氏穴氏之所攻與其所獻獨不可合於獸人乎而事有其官官分𨽻於數處先王豈好為是不急之物禄無用之官以待有事之用邪曰先王司事以㑹官作吏者因官以存名其名不可廢其官則未必皆有試舉其畧言之土訓誦訓無他職事掌葛掌染草角人羽人止征一物戎僕戎右軍司馬輿司馬行司馬有軍旅則用之甸祝田僕有田獵則用之有喪紀則用夏采喪祝有盟詛則用詛祝建邦國則用土方氏逺人來則用懐方氏事至則臨事而兼之三百六十官其臨事而兼者殆相半也且自服不氏以至羅氏自冥氏以至庭氏大抵皆下士一人否則二人皆徒二人否則四人惟掌畜下士二人則有史有胥有徒二十人然比之天官獸人䱷人府史胥徒皆具而徒之多至於三百則又不同矣由此言之天官獸人以下雖具官而設局而夏官秋官如服不氏羅氏掌畜一二職之外意其必皆臨事而兼之耳或曰是則然矣服不氏以下何以必屬於夏官冥氏以下何以必屬於秋官曰掌養鳥而阜蕃之掌養猛獸而教擾之阜蕃教擾為養育之事夏為養育之時故以屬司馬掌攻猛獸蟄獸而獻之掌攻猛鳥夭鳥而殺之攻為殺伐之事秋為殺伐之時故以屬司寇至於凡田獸之政令則要皆獸人掌之先王於鳥獸之微魚鼈昆蟲之細其在所當養則設官以養之以順春生夏長之道非獨養民而已也其猛鷙在所當去其託為神姦在所當除則設官以去之除之以象刑罰之威以順天地肅殺之氣非獨詰姦慝刑暴亂而已也夫以鳥之髙飛獸之逺走魚之深潜昆蟲之雜出至難及以政者也而先王於此猶無所不盡其心焉甚矣法制之修明而先王為天下興利除害之意非若後世之茍且也如是而受天下之報享天下之利備四海九州之美味可以共受之而無愧矣天下之生久矣一治一亂當堯之時天下猶未平其所以為民物害者非獨洪水而已也自禹驅龍蛇而放之菹而後民不至於無所定自益烈山澤而禽獸逃匿而後獸蹄鳥跡之交於中國者無有容鳥獸之害人者既消猶懼其不終息滅而復出為惡於是又鑄鼎象物百物而為之備使民知神姦故民雖入山林川澤不逢不若而其所當養者則有益為虞而掌之蓋周人之政即虞夏之舊政也維紂之時園囿汙池沛澤多而禽獸至周公相武王誅紂伐奄之後即驅虎豹犀象而逺之每觀孟子論三聖之功以為驅猛獸而百姓寧比之禹抑洪水而天下平孔子作春秋而亂臣賊子懼蓋知猛獸之為天地間害與洪水夷狄亂臣賊子同天下既平九州清宴八荒㑹同之後周公安得不為無窮之慮哉因事而建其官因官而存其名此非不切之務無用之官也先儒徒見夫獸人之官修則以為寧百姓之大徒見夫䱷人之官修則以為養萬物之悉孰知興利除害事已而不敢不存其名有非一職也周道衰而官職廢先王興利除害之意無一復存春秋書秋多麋則不復有獸人之獻亳社之雁東門之鴝鵒則不復有硩蔟氏庭氏之毆除校人之烹鴛鴦之詩魚藻之詩君子傷今而思古則不復有􅘋人鼈人大羅氏之養當是時也龍蛇之孽羽毛鱗介之禍史不絶書不惟物性不得其寧而萬物亦不得其養欲令徳及昆蟲而禽獸之不逼人者難也蓋後世養民之政猶茍且而不及况於鳥獸禽魚之難及以政邪漢有一宋均能出九江之虎唐有一韓愈能遣潮陽之鱷則當時以為創見駭聞之事嗚呼彼獨不見禹之驅龍蛇周公之驅虎豹犀象與周官之治鳥獸蟲魚邪醫官論醫師以下五官或問醫有醫師足矣而食醫疾醫瘍醫獸醫無乃太冗乎曰古者史官樂官與夫醫卜之官皆世掌之業不兼官不二事懼其不精也况夫醫不三世不服其藥執技以事上者惟醫為難精惟疾病為不可不謹先王豈敢以一人而兼二三人之能哉是故食醫之下有疾醫調飲食者不兼於治病也疾醫之下有瘍醫察内證者不兼於外證也瘍醫之下有獸醫治禽獸者不兼於治人也必求其精而不敢計其冗甚矣夫先王之仁也曰先王之於醫事嚴矣然自萬民及鳥獸無不治療而王后世子之尊公卿大夫之貴反不及焉何也曰萬民之疾治其疾於已然自王而下則去其疾於未然子不於食醫而講求之乎凡人之疾未有不生於飲食之不謹今也飲食膳羞珍醬之齊既以時而眡之鹹酸世苦辛之助無不以時而和之牛羊犬豕魚鴈之宜又以其物而㑹之凡所以調和王之飲食而助養王之血氣未嘗不及於愜適疾病何自而生乎是故治之於未然之前也不獨食醫為然膳夫以下如烹人則掌水火凡美惡新舊之不同則必辨之如庖人内饔則掌禽獸凡腥臊羶香之不可食則必辨之苟有一物之傷生害氣者無所不致其察也又不獨烹人庖人内饔為然凡五齊七菹之用醯者則有醯人以掌之凡百事之用鹽者則有鹽人以掌之醯酸鹽醎然後足以成五味之甘而致四時之和補五臟之不足故雖瑣瑣末節而必立之官以至膳羞酒醴之物淩人於夏則鑑冰以進以禦暑惡之氣六宫六寢之脩宫人於春冬則掌爐炭之共以辟寒濕之氣井匽以流其清泚而泄其汙穢沐浴以澡雪其精神而悅懌其膚體茍有以助王之養而全其内外之和者無所不致其備也又不獨醯人鹽人淩人宫人為然内宰之職以隂禮教六宫以隂禮教九嬪九嬪則以時御叙於王所女御則御叙於王之燕寢苟可以防微而杜漸戕其真而蠱惑其心志者無所不致其嚴也王之所以䕶養如此而何疾之可致邪大抵味以養精者也榖以養形者也藥石以治疾者也養精為本養形次之治疾為下莫貴於王而至於設官以待其疾不惟非臣子之心而亦非所以為奉養之至者也醫不及王又何疑乎若夫萬民則不然夫自王而下至於公卿大臣凡有爵而貴者不幸有風雨霜露寒暑燥濕之感則其權力足以致醫其財賂足以使醫則亦不待於設官以掌之惟編户齊民未有特富者生生之具雖粗給而祭祀醫藥必有所不足力既不足以致醫而良醫又不屑於治則夫疾醫以下茍不設焉民之死於非命者必多也蓋嘗講衛生之經矣天有五星故有五行以為寒暑以為隂陽風雨晦明分為四時序為五節滛則為烖以生寒熱末腹惑心之疾人有四肢五臟化為五氣一覺一寐吐納往來流為榮衛章為氣色發為聲音以生喜怒哀樂愛惡欲之情過則有傷夫天之寒暑隂陽風雨晦明既足以傷形而人之喜怒隂陽運於榮衛之間交通則和有餘不足則病今也喜怒之不節與寒暑之過度者適相值焉是以其生不固疾疢交作寒極為熱熱極為寒為癘瘧為痒疥結為瘤贅䧟為癰疽以至不能自有其生於天地之間當是時也而不有聖人同萬物之憂同民吉凶之患不有良醫探性命之情而順隂陽之理辨内外之證而明死生之訣則將誰與哀救之哉是故疾病疕瘍總之於醫師而分治之於疾醫瘍醫疾醫掌民之疾病而以五味五榖五藥養其病以五氣五聲五色眡其死生兩之以九竅之變參之以九藏之動瘍醫則掌腫潰金折之瘍而攻之以五毒養之以五氣療之以五藥節之以五味以至獸病獸瘍亦有官以掌之亦推其有餘以及其分治其事而各精其業嵗終則稽其醫而制其食考其全失而定其上下國家仁民愛物之意至是極矣若曰養王於未疾之前而治民於已病之後此非先己而後民也尊卑之分貴賤之理臣子愛君之深意也雖然周家亦豈一切治民於已病哉淩人之官日在北陸而藏冰昭公四年夏之十二月也西陸朝覿而出之夏之三月也司爟之官季春出火民咸從之季秋内火民亦如之夫出火而藏冰皆所以助陽而抑隂納火而求冰皆所以助隂而抑陽以是逹隂陽之氣而均寒暑之節是以冬無愆陽夏無伏隂春無淒風秋無苦雨癘疾不降民不夭札而時疾皆可以禦是亦不必皆待其已然而後治之也學者講求周家待民之意則知王之所以不言醫益無可疑者矣氣體均和膚革充盈無傷生害氣之食無沉酣燕泆之飲無滛荒迷惑之好無風雨露霜寒暑燥濕之感百病之源固已醫之於平時暇日也昔者春秋之世晉平公有疾求醫於秦昭公元年秦伯使醫和視之曰疾不可為也是謂近女室其疾如蠱非鬼非食惑以喪志良臣將死天命不佑夫平公惑女寵以致疾而醫和歸咎於良臣何也不救君之過不能節王之聲色彼蓋有所傷而思古也且不獨此也知悼子卒未葬而平公鼔鐘以飲酒小大之臣為一飲一食而忘君之疾太師不詔褻臣不規而杜蕢以區區之宰夫反越刀七之職而進救益之戒酣酒嗜音而内作色荒是安能無疾邪西漢以太醫太官湯官導官及庖人皆𨽻於少府而統於丞相御史是猶有周家之遺意至東漢則尚藥太官御者雖如舊而悉用閹人以主之其意已不謹矣晉以太官屬光禄以太醫屬宗正渡江以後則太官太醫悉𨽻於侍中而唐則悉𨽻於侍内者而大臣無所統率於其間矣夫大臣無所統則小臣無所忌飲食醫藥不相聨則彼此不得以相察每思天官冡宰之分職以膳夫等官列於前而以食醫一官列於後此最防微之深意割烹煎和一有失宜則食醫皆得以糾察之雖曰王不言醫其醫豈不預邪蓋至於大臣之政令不行則飲食酒漿之小官各求以自媚於上雖宰相無如之何矣而何太醫尚藥之足忌也嗚呼此周公之思慮所以求深長而醫師以下五官始有可得而論者鹽酒或問鹽人掌鹽之政令酒正掌酒之政令政令之在官者既掌之矣其在民者將如後世之𣙜鹽𣙜酒乎抑以鹽酒與民而聴民之自取其利乎謂鹽酒有𣙜則先王九賦之目未聞有鹽酒之故而與斯民争口腹之尋常亦非先王所以仁天下之心謂聽民之自取其利則鹽人之外在地官則有川衡以誅罰其犯禁酒正之外在地官則有司虣以掌市之飲禁在秋官則有萍氏以掌㡬酒謹酒之禁又與後世曽不少異焉何也曰先王之有鹽禁也禁其棄本逐末與官吏之緣公為私而已其於酒禁也禁其羣飲以鬭争沉酣以敗風俗與其流生禍糜米粟而已若夫醯醬之所需飲食之所用祭祀之所羞孝養洗腆之所樂嵗時㑹合冠婚鄉射之所飲則先王固與民共之但收販鬻者之賦而非復自貪其利遏其源而不以一孔遺民也昔者晏子謂齊侯曰昭公二十年山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政偪介之闗暴征其私是以民人苦病而夫婦皆詛晏子之為是言也是知山林之利先王以來固未嘗不與民共之也晉人謀去故絳成公六年諸大夫皆曰必居郇瑕氏之地沃饒而近盬韓獻子獨不可曰山澤林盬國之寳也國饒則民驕逸近寳公室乃貧獻子之為是言也是知山澤之利雖與民共而猶未嘗不慮其舎本逐末以至於貧匱不給也漢興猶存此意鹽鐵酒𣙜之利雖盡捐以與民而後元之詔亦拳拳然憂百姓之從事於末以害農多為酒醪以糜榖先王之意正若是而已矣春秋秦漢以來猶不忘之況以周公憂民之深乎以百畆分民以九職任民有本之可敦則其末為可抑有生生之可樂則其刑罰為可畏是故周公雖不與民争鹽酒之利亦不恣民趨鹽酒之利夫煑海以為鹽利至博也不為之禁則緣畆之農夫將日耗侈心日動而本心日摇官吏之貪者亦將並緣以為姦矣豢豕以為酒禍至無窮也不為之禁則滛酒而無度是以民人及市羣飲而鬭囂酒亂其徳而獄訟日益繁滋矣周公於此則一切有法以待之其鹽人酒正之政令彼特施之上者也而猶有式法以受酒材有酌數以供祭祀有法以行頒賜有書契以授秩酒有日成月要以考出入自王后之外雖世子之飲亦有嵗終之㑹而況敢縱民於酣飲乎其取鹽也必有簿書以責其數其受鹽也必有符節以防其偽況敢縱民於浮食乎故公鹽之入有數而民之食鹽者亦有數公酒之用有數而民之飲酒者亦有節但酒正内官耳自酒人而下皆奄奚為之勢不可以行呵禁於外故至市官之屬則有司虣以掌之刑官之屬則有萍氏以掌之鹽人既共祭祀賔客之鹽共王后世子之鹽與凡牲膳羞醬百事之鹽故雖專鬻鹽之命而掌天下鬻鹽之數而山林川澤鹽鐵之藏則有澤虞川衡以掌之而川衡之掌則又有大川中川小川以别之巡其川澤而平其守執其犯禁而誅其人内外相若相維而法令可次相考大抵勸農而美風俗耳其禁雖嚴初不以自利也其民安於禁而樂於生初不以為怨也若夫後世則不然自文帝以來雖不與民爭利然徒善不足以為政而鹽鐵在民酒利在民其亦太無制矣徒知其害而不能定其法嵗雖勸民耕殖不知固已導民而趨末也至於孝武則又不顧斯民之無以為生一舉而盡奪之幹官鐵官之設雖近於酒正鹽人水衡都水之設雖近於萍氏大抵不過幹鹽鐵而𣙜酒酤耳而又或屬於内史或屬於少府大臣之政令不行於其間而取之無藝歛之不愜衆心取斂有不平於下而鹽鐵酒𣙜均輸之議所以起後日賢良文學之紛紛也自是而後其禁益嚴其犯愈衆吏卒搜索私屠酤至於壊室廬而毁釡竈兄弟妻子離散生業破蕩無餘而民之以酒𫉬罪者方日來而未已髠黥積於下私鬻不為衰減力不足以執之則浸成頑俗而流入姦盜民豈樂為此哉上之人既不能制民之産民方懼死於飢寒而冐求升斗以苟活但莫知性命縱之則不顧而逐末迫之則急而犯法耳固未易呵禁也先正翰林蘇公論酒誥一書以為漢武帝以來至於今皆有酒禁刑者有至流賞或不貲未嘗少縱至於私釀終不能絶也周公獨何以禁之曰周公無所利於酒也以正民徳而已甲乙皆笞其子甲之子服而乙之子不服何也甲笞其子而責之學乙笞其子而奪之食此周公所以能禁酒也況又有所謂百畝之可耕九職之可任乎今世鹽酒之禁蓋亦反其本而已正使有本之可趨猶不當禁之使至於此極況未嘗有本也舊嘗論州縣官吏之自為私酤而不必禁民之私酤又嘗論州縣當置鹽本錢為之增價以買鹽而減價以賣鹽此則姑因今日之勢而行此不得已之策譬之欲紾其兄之臂而教之姑徐徐云爾周公之法意至此殆有未易言者太平經國書卷九
