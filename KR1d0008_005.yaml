body:
  text: 太平經國書卷五宋鄭伯謙撰賓祭論六官祭禮賓客太宰祀五帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒及執事視滌濯及納烹贊王牲事及祀之日贊玉幣爵之事祀大神示亦如之享先王亦如之贊玉几玉爵大朝覲會同贊玉幣玉獻玉几玉爵作大事則戒於百官贊王命王視治朝則贊聽治視四方之聽朝亦如之凡邦之小治則冢宰聽之待四方之賓客之小治小宰以法掌祭祀朝覲會同賓客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用治其施舍聽其治訟凡祭祀贊玉幣爵之事祼將之事凡賓客贊祼凡受爵之事凡受幣之事宰夫以式法掌祭祀之戒具與其薦羞從太宰而視滌濯凡禮事贊小宰比官府之具凡朝覲會同賓客以牢禮之法掌其牢禮委積膳獻飲食賓賜之飱牽與其陳數或問以典待邦國之治則六典已有賓禮以法待官府之治則八法已有官成今邦國都鄙官府之下所謂以官成待萬民之治以禮待賓客之治必特舉而復見之何也曰先王之所以奉若天道建邦設都立后王君公承以大夫師長者非以為已凡所以為民也曰先王為民之意則重矣彼賓客何為邪曰先王出門如見大賓使民如承大祭待天下之民常若待賓客之重使天下之民常若臨祭祀之嚴故周禮一書有一言以及於祭祀必有一言以及於賓客者先王固將以其祭祀賓客之心而為出門使民之心也此心無異敬此敬無異用舉是三者而皆以一敬心行於其間自常情處之待賓客之心必重於待民之心待鬼神之心又必重於待賓客之心夫是以臨祭祀則猶能莊敬以自強而待賓客則此敬已少衰而待其民則益衰矣敬心日益衰則欺心日益甚蓋至於此則臨祭祀享鬼神其終亦不誠而已世固未有一心而二用者是以先王待民之心即其處祭祀賓客之心而太宰而下所以勤勤於祭祀賓客而􅊏悉委曲不敢不盡其誠者固將以廣其敬推其心而達之於天下也且以祭祀賓客言之周之先王知幽明之無異理也故凡宗廟之事則一以人道處之忽焉如在其上如在其左右事死如事生事亡如事存朝事之籩豆以象朝時事其親之所進饋食之豆籩以象食時事其親之所進無非以人器為用焉謂不如是則必至於慢凡賓客之禮則一以神道行之相朝於寢廟相見於阼階几設而不倚酒盈而不飲見昭公五年肉乾而不食樂之有相宗廟則然而賓客亦如之徹之有歌大祭祀則然而大享亦如之大羮鉶羮致美味而彼此無異用盬鹽形鹽致多品而幽明無異儀享之用祼而賓客亦有祼胙之用俎而賓客亦有俎無非以神道為用焉謂不如是則必至於褻不慢不褻不敢以易心處之凡衣服器用之類牲膳醬羞之品備羮致美之享贊祼酌獻之儀典之大宗伯而散之三百六十官者無一事之不同焉故先王之與賓客並言於典瑞大享之與祭祀並言於大司樂以至春祀夏禴秋嘗冬蒸即其朝覲宗遇之儀也上公再祼諸侯一祼即其灌地求神之味也洞洞之敬屬屬之忠即其濟濟之文肅肅之嚴也人徒見鬼神之道茫昧而不可知恍惚而不可見而賓客之事粲然有文歡然有恩則以為幽明有異塗而不知其未始有異理也自今以太宰小宰宰夫終篇而言之太宰之職於祭祀既掌其警戒具修及其滌濯牲幣於賓客則必掌其朝覲會同及其幣獻几爵小宰之職於祭祀則贊於幣爵之事祼將之事於賓客則亦贊祼受爵之事受幣之事宰夫之職以式法掌祭祀之戒具與其薦羞以牢禮之法掌賓賜之飱牽與其陳數夫豈無他事邪而一則曰祭祀賓客二則曰祭祀賓客不惟並言之而於天下紛然萬務之中又常首言之吾固知先王將以其祭祀之心而為待賓客之心又將以其祭祀賓客之心而為出門使民之心也凡太宰正歲之所申明歲終之所考課小宰宰夫於歲終之已考課而復贊太宰以正歲之申明大抵尤嚴於此二事而已昔者商之季世紂之不道甚矣而泰誓牧誓之所以數其罪者尤在於弗事上帝神祗遺厥先宗廟弗祀牲犧粢盛既於凶盜而謂祭無益謂敬不足行也夫莫尊於天莫重於宗廟而猶不知敬焉亦何有於賓客萬民邪友邦冢君八百所以皆去而從周而君子小人所以簞食壺漿而並迎王師也武王克商深鑒覆轍訪箕子以洪範而於五行五事之後天人定位之餘首致意於八政之疇蓋其一曰食其二曰貨其三曰祀食貨既足則首及於報本之祭祀也四曰司空五曰司徒六曰司寇七曰賓八曰師蓋司空以居民司徒以教民司寇以威民而終之賓者以見其平日待民之心無異於待賓客之心也同此一心同此一敬紂以不敬而亂武王以敬而治成王周公親繼志而述事豈敢不究心於此哉抑嘗以周之三頌求之清廟以下諸篇若維清執競皆所以頌成王之祭祀也臣工以下諸篇若振鷺若載見有客皆所以頌成王助祭之賓客也閔豫小子以下諸篇若載芟之祈社稷酌之酌祖道皆所以頌成王之愛民也成王推其對越上天之心而為待賓客萬民之心故詩人循其序而頌之而其見於二雅者尤詳焉由是言之周之家法始於武王而備於成王洪範之八政以見其略而周官之六典以見其詳周官之六典以見成王之所言而周詩之三頌又以見成王之所行相體論小宰宰夫行法太宰以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聯以會官治四曰官常以聽官治五曰官成以經邦治六曰官法以正邦治七曰官刑以糾邦治八曰官計以弊邦治小宰掌建邦之宮刑以治王宮之政令凡宮之糾禁康成曰若今御史中丞宮刑在王宮者之刑建明而布告之也正歲以宮刑憲禁於王宮帥治官之屬徇以木鐸曰不用法者國有常刑令於百官府曰其有不共則國有大刑以官府之六敘正羣吏一正其位二進其治三作其事四制其食五受其會六聽其情以官府之六屬舉邦治其屬各六十大事則從其長小事則專達以官府之六職辨邦治以官府之六聯合邦治以官府之八成經邦治以聽官府之六計弊羣吏之治一亷善二亷能三亷敬四亷正五亷法六亷辨宰夫掌治朝之法以正王及三公六卿大夫羣吏之位掌其禁令敘羣吏之治以待賓客之令諸臣之復萬民之逆掌百官府之徵令辨其八職掌治法以考百官府羣都縣鄙之治乘其財用之出入凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之歲終治不以時舉者以告而誅之正歲以法警戒羣吏令修宮中之職事書其能者與其良者以告於上宮正掌王宮之戒令糾禁宮中徒役及諸官府在內者內宰掌治王內政令有王宮有王內言王宫以王內為后宮言王內以見王宮之在外也秋官士師亦掌宮禁或問三百六十官聽命於六卿六卿聽命於太宰其事權亦重矣而廢置誅賞之説僅不過終篇一言之若小宰宰夫所以二太宰者耳而馭吏之嚴反諄諄言之不置凜凜乎有不可犯者何也曰此所以尊太宰而嚴之也夫坐而論道謂之三公作而行之謂之士大夫周以三公兼太宰三公與王論道經邦究心於理亂安危之大者故惟造原立本出為修教以與當世士大夫躬行而世守之太宰不自親其治也故治官之屬太宰建其典於上而小宰率其職於下太宰操其柄於上而小宰舉其法於下宰夫亦然自內之王宮而言之小宰既建邦之宮刑治宮之政令舉宮之糾禁憲禁宰夫又以法致羣吏之警戒令宮中之職事書宮中之良能其於治內之法無不致其嚴也自外之官府而言之小宰既推廣太宰之八法以為六敘六屬六職六聯八成六計宰夫又推廣小宰之六職以為八職小宰既曰不用法者國有常刑其有不共者國有大刑宰夫又曰失財用物辟名者以官刑詔冢宰而誅之治不以時舉者以告而誅之其間掌其政令掌其禁令掌百官府之徴令弊羣吏之治敘羣吏之治考百官府郡都縣鄙之治其於治外之法尤嚴於治內也治內外者嚴則所以尊太宰者為甚嚴尊太宰者嚴則所以尊人主者為益嚴君宰尊嚴則朝廷清明小大稱職百官於是乎戒懼而有不敢易紀律者當是時也太宰常居其逸而小宰宰夫常見其勞太宰常見其寬而小宰宰夫常見其嚴厲而可畏秦漢以來此制隳矣大臣之道揆不明而百官有司之法守滋亂陳平雖自以為上佐天子理陰陽下遂萬物之宜而不對文帝錢穀刑獄之問然亦未為得太宰之體者蓋小宰宰夫之所頒行無非本於太宰之所建立焉且食貨國家之大本廷尉生民之司命宰相恝然不以為意一舉而盡付於其人而曽不究竟其大綱經理其本末源流乎是以清談而不事事為好言以自解耳刀筆筐篋而不知大體者則又不過如賈生所言時以簿書不報會期為大故與夫王吉所謂公卿幸得遭遇其時曽未有建萬世之長策舉明主於三代之隆者其要在於斷獄聽訟而已也以諸葛武侯之賢相蜀之日夙興夜寐罰二十以上皆自親之而出師臨發之表僅方以宮中之事委之郭攸之費禕以營中之事委之向寵其見亦已晚矣大抵自周而降宰相大臣其清談不事事者則宏綱大法之所當經理一切委棄而弗顧其不能拔於俗吏而困於文墨者則雖斷獄聽訟之區區又一切自以其身親之統紀不明同歸於亂或者有意於周公之制如近世唐太宗之六典亦庶幾矣而舉國家之政散於臺省寺監之中以侍中中書令尚書令為宰相之職則既政不出於一而又以吏部尚書參議之御史大夫參議之祕書監參議之議政者何其多也太子詹事同中書門下三品太子太保又同中書門下三品同三品者何其濫也政均於人品均於官上不足以臨下而下亦無所忌於上交相輕而交相忌其中則又有宰相反奉行文書事權迭出而奔歸羣有司者西漢之事權歸御史東漢之事權歸臺閣唐與宋朝之事權歸諌垣三者本宰相之屬也權均勢敵而人主之意方苦之遂至於反奪其權然則周家太宰之制至是而三變矣蓋其始也大臣自棄其權而不為其中也則貪其權而不擇其所當為其卒也則上之人又奪其權而不使之有為為天下國家者亦何便於此此太宰之立法而小宰宰夫之奉法余之所以不得不論也學者蓋因其論而知三代之下事權之分合與夫官制之本末源流太平經國書卷五
