body:
  text: 太平經國書卷一宋鄭伯謙撰教化論六典以為民極或問周公之敘六典也辨方正位體國經野設官分職之下每終之以為民極此特建國之始耳未見其有與於民也民何以遽取極於此哉曰先王之教天下未始有精粗本末之間也司徒一官名曰教典自今職職而考之六十官之內大抵皆分畫鄉遂整理田疇征斂財賦職掌山澤與夫市井門關之事師田行役祭祀喪紀冠昏鄉社之法而已有如鄉大夫州長族黨之職則不過屬民讀邦法師氏保氏諌救調媒之職則不過掌國中得失之事其曰十二教曰三物之教曰五禮六樂之教教之條目甚設而教之官屬不詳見焉先王之教固與夫後世事文墨語言誦説傳授者不同也有如王之立朝后之立市朝之居前市之居後公卿大夫之在朝百工商賈之在市人見其為辨方正位而已經塗之九軌而野塗之五軌宮隅之制而以為諸侯之城制都之經塗體野塗焉諸侯之經塗體環塗焉人知其為體國經野而已朝官居朝市官居市卿大夫王后入市則有罰二鄉則公一人一鄉則鄉一人由此而統六遂由此而倡九牧人知其為設官分職而已孰知其所以定民之志而為教之大者固在於此邪夫朝不混市野不踰國人不侵官后不敢以姦王之權諸侯不敢以僭天子之制公卿大夫不牟商賈之利六卿九牧相屬而聽命於三公夫彼皆民上也皆富且貴焉者也而尺寸不敢踰一毫分守不敢易所以習民於尊卑等衰階級之中消其亡等冒上之心而寓其道德之意蓋孔子所謂吾無行而不與二三子者是以民服事其上而下無覬覦賤不亢貴卑不踰尊舉一世之人皆安於法度分守之內志慮不易視聽純一易直淳龎而從上之令父詔其子兄授其弟長率其屬何往而非五禮六樂三物十二教哉方位國野設官分職何往而非以為極哉嘗讀晉之國語每歎絳之富商民韋藩木楗過朝之事以為富商之饒於財使之澤其車而華其服非不足也而必易車服於過朝之際不敢混然與士大夫無别焉民志之定而中道之存成王周公之遺化固隱然在此也古人教民之意深矣且不獨周公然也康王命畢公以康四海不出於表宅里殊井疆畫郊圻之間周公陳先公風化之由惟在於于耜舉趾條桑載績播種稱觥之事孟子以五穀魚鱉不可勝食與使民養生送死無憾為王道之始韓退之以士農工商之民父子兄弟夫婦朋友之位推而至於宮室桑麻粟米蔬果魚肉之物而歸之於道化之原皆此意也後世王制不明道揆法守不立本末源流之論不講而左右前後尊卑貴賤之際聽其相冒而相易類聚羣分日用飲食交際文為之間無復有能寓吾道德之意天下之人旁觀而習見之耳目亂而分守易秉彝者雖不泯滅而生厚者因物有遷矣君臣之間方以因民出治為美談開設學校置博士弟子員下詔勸學以風勵四方以改易萬民之觀聽儒者又從而諛之曰是有志於教化者名存而實不至疏漏而無統紀可以善人之形而不可以善人之心也上為文具下為觀美相與為欺而已及陷乎罪然後從而刑之以為示弗率教化者是罔民也漢事文墨晉尚清談統紀不明同歸於亂大司徒教典之意六官以為民極之説誰與講明而告君者奉天論天官冢宰加官或問冢宰一官其屬六十顧未始有一事之關乎天者而冢宰謂之天官何也曰此加官也唐虞稽古建官惟百凡天地之運化四時之作訛成易事之關於天者羲和職之教化禮樂之要兵刑財穀之司虞工納言之職十有五人之職所以分天下之萬事而治之者也至周以來則省九官以為六卿之職又省六子以冠六卿之號以虛名而加實職併而授之所以寵而尊之也漢之官制猶為近古大司馬六卿之職武事者彼霍光領尚書耳內主公卿事外掌四方章奏於司馬何與邪而大將軍之上必冠以大司馬之名此正祖天官冢宰之故意也或曰古者聖人重天道伏羲有神龍之瑞故以龍紀官黃帝有慶雲之瑞故以雲紀官共工以水神農以火少昊以鳥顓帝之後以民則重黎勾芒祝融后土蓐收玄冥是也帝堯之興以天地四時則羲和及四子是也帝舜之興以五行則益火稷穀禹水是也今成王周公之建官考前世之制而兼其長必若所謂虛名加實職則事之關乎天者其屬之誰乎曰子以為古之大臣其所謂寅亮天地而燮理陰陽者若厯官星翁文史卜祝之所為乎凡論道經邦以轉移人主之心術而釐正天下之萬事者皆寅亮燮理也皆對時育物撫五辰而熙庶績者也是故日月之薄蝕百川之沸騰詩人所以刺卿士穀洛之鬭太子晉以歸咎於執政焉和同天人之際使之無間然者雖聖人之能事而大臣實輔佐之其誰曰人事之非天理也加天官於冢宰之上其尊大臣也雖至其所以責大臣也益深省官論天官冢宰兼官或問太宰至旅下士其為官凡六十有三而為府者六為胥與史者皆十有二而為徒者百有二十何也曰此皆兼官也専官行事則不足兼官行事則有餘矣蓋自唐虞以來禹以司空而兼百揆羲和以二人而兼四嶽及舜二十二人之咨則四嶽實一人兼之古者官不必備惟其人而已有其人則備無其人則兼是以周官之作實效唐虞之制而官事不攝吾夫子所以深責管仲變先王之法也以三公言之召公為保周公為師而太傅無有焉召公實兼之也周公既沒召公為保而太師太傅無有焉召公實兼之也不惟此也三公之下實有三少當時不見其人召公又兼之乃同召太保奭芮伯彤伯畢公衛侯毛公是六卿之長召公又兼之蓋一人之身而兼總七職矣抑不惟此也當是時三公三少既難其人而六卿之官亦不必備周公以三公兼冢宰召公以三公兼宗伯蘇公以三公兼司冦畢公毛公以三公兼司馬司空惟成王之季年芮伯彤伯衛侯實專領司徒宗伯司冦之職其餘大抵皆兼官也其大者猶兼而況於百官羣有司乎故嘗以周禮考之二鄉則公一人是三公兼鄉老也一鄉則卿一人是六卿兼鄉大夫也軍將皆命卿是六卿又兼六軍之將也甚者太公以太師而兼司盟之職載在盟府太師職之是也蘇公以三公而兼太史之職太史司冦蘇公是也故夫六官之中以春夏秋冬為通率以多少相乘除大約一官凡五百人則六官凡三千人而其兼行權攝者意其必相半焉天官卿大夫命士三百五十餘人地官除鄉遂山虞林衡司門司關不可考尚四百餘人春夏秋三官凡五百餘人是六官通率之凡三千人也是以局分不必設府史胥徒不别置雖置而其數亦未嘗過濫也且不見鄉老遂師而下乎府史胥徒四者俱無有何獨於天官冢宰而疑之也若夫專官行事勢宜多而不宜省則􅘋人之與甸師其徒皆三百人而春官御史其史則百有二十八矣內治論天官冢宰屬官或問三公與王論道經邦當時下兼冢宰而其所統六十官之屬往往皆士大夫所不屑為之務何也曰此固所以論道經邦也人徒見夫內外庭宿衛之士士之賤者也烹庖饔膳之事事之辱者也魚臘酒漿醯醢之物物之微者也次舍幄帟裘服為末用而宦寺嬪御灑掃使令為冗役也而不知夫三代以還所以蠱壞人主之心術而侵奪大臣之權柄者往往皆是人為之蓋公卿大臣其內外則有限其進退則有時不得日侍人主之左右前後也若夫侍御僕從之人備趨走使令之職而人主宴私玩狎之際無不與之同焉比其極也則變換其耳目感移其心志伺候以和其旨夸靡以中其欲小亷小謹以市其信人主一墮其中則亦何所不至哉故雖以文武之聖而侍御僕從猶樂於得正人而周公之所以相成王而詔後世者又不獨見於太宰之屬他日立政之作尤拳拳於綴衣虎賁趣馬之微焉昔者先王之時宗祝在廟三公在朝三老在學而前巫後史卜筮瞽侑凡所以在左右者無不致其謹焉用能保護君心養成聖德宦官宮妾便嬖側媚得以趨走使令於前而不得以乘間取榮寵竊威福也周公之深智逺識固有見於此是以亂萌禍機之所在無不究極用見古人輔相之事業皆格物窮理之學要非屑屑然樂親羣有司之細務而後集權勢以尊已也宮中府中俱為一體後世識此意者諸葛孔明一人而已漢初猶存此意士大夫所不至者惟後庭爾朝夕出入禁闥洞然無內外之限故人主親士大夫之時常多而親宦官宮妾之時常少日見正事日聞正言心安而耳目熟論道經邦之地固造原立本於此也自武帝宴遊無度於是外庭日疏內庭日親公卿大夫一切隔絶不接見而小人獨在左右事趨媚矣大臣無權而小臣專權異時關內侯騎都督之爵下及於烹庖樂工醫師之賤至鳴玉而曳組房闥有制政之漸妃妾起巫詛之風閽寺擅廢立之權夫誰得而制之微物細事其傾禍毒國至於此烈也而今世儒者顧方不屑意於天下之細務溺意高逺學僻而事左異日敗理傷化則往往起人主厭薄之心是故書生之清談而迂闊者不足怪也論道經邦之事業當於太宰屬官而求之官吏論六官府史胥徒或問府史胥徒庶人之在官者也先王之時無曠土無遊民彼在官者以何人為之祿足以代其耕也以何祿賦之以一歲而更邪或終身而充邪抑免其家之徭役與否邪曰學周禮者其論此固多也而未有愜人意者焉蓋其説則曰民自民也吏自吏也一日為之則終身居之此則不可之大者夫終身為吏異時既老且死誰其代之謂其子孫繼之邪則不幸有愚不肖之嗣何以遽服公家之役謂其子孫不得繼邪則當削其祿而授之田彼素不習農畝之人何以遽安耒耜之勞苦不然一人為吏則一家世其祿也先王之祿地固無若是多也後者之來將何以待之余嘗考之矣凡起徒役毋過家一人此兵賦之定數也甸出長轂一乘此車賦之定數也司馬法則曰井十為通通三十家士一人徒二人通十為成成三百家革車一乘士十人徒二十人積而至於終則為士徒者四百又積而至於同則為士徒者三千夫以周官甸法考之甸六十有四井受田之民五百一十二家矣今士徒乃止於三十何邪説者以為此調兵之法先王寬民力之意故兵者視農者而損行者視居者而益不知王畿之兵未嘗輕出何為而遽發之就如其議則均之為兵耳使居者處其安而行者處其危得無有未平乎司馬之所征是固府史胥徒之所出也嘗考是四者之數於六官之中蓋冢宰一官則二千六百六十有六宗伯一官則二千三百四十有一司馬則三千二百六十有五司冦則二千六百五十有七四官之數固已萬人矣又況地官無常數冬官散落不傳雖權行兼攝官未必置而府史胥徒未必實有而其數固已多矣不調諸民而充之其誰實為之哉然則是徒之征其為府史胥徒之用昭昭也蓋自六鄉而至六遂自六遂而達三等采邑凡受私田而為民者其有德行道藝則大司徒三年大比而升之升於司徒則不征於鄉其止於有才有力者則大司馬立法而征之更調迭發以給公家之徭役焉其上者為府為史其次為胥又其次則為徒上以充宿衛下以給官府其在官則祿於四郊其任事則止於一年其受代而去則復業於百畝一人去之一人居之今之為吏者乃昔日之為民者也今之為民者又後日之為吏者也閭閻之利病田里之囏厄夫家之衆寡馬牛六畜之登耗政事法令之可否上下相諳彼此相恤更處而迭為之吏無所病於民而民無所苦於吏先王維持天下之政固不惟公卿大夫士而已雖府史胥徒亦有助矣宰相論太宰建邦六典或問六卿分職各率其屬見於周官之篇以官府之六屬舉邦治以官府之六職辨邦治見於小宰之職自治典至事典截然分畫宜若一定而不可易今太宰之職顧曰掌邦之六典何也曰此太宰兼行六卿之事也自其分職而言之凡朝廷之事固屬之太宰國中之逺郊近郊大都小都公邑家邑凡郊畿之事固屬之司徒職方氏土方氏以至撢人凡邦國之事固屬之司馬禮屬宗伯刑屬司寇工屬司空自太宰之兼行六卿而言之則六典八法八則八柄八統九職九賦九式九貢九兩凡此十條皆經國之大綱政事之條目而散見於三百六十官之中太宰實舉其綱而攝其要焉又非獨曰格物窮理克勤小物而已也蓋唐虞三代建官之制職事分於下而權綱合於上非泛然而無統也四嶽通內外之官羲和之長也羲和則實聽於四嶽百揆宰相之職百官之長也九官則實聽於百揆百揆統九官四嶽四嶽統羲和四子比附聯絡天下之治雖非一二人為之而實一二人能使之成周之制亦然三百六十屬聽命於六卿而六卿聽命於冢宰冢宰實三公兼之渙散分析之中而有比附聯屬之勢自今職職而考之太史內史掌六典八法八則八柄之二春官之屬也而典法之正則在於太宰太僕掌諸侯之復逆小臣掌三公及孤卿之復逆御僕掌羣吏之逆及庶民之復夏官之屬也而臣民之總則掌於宰夫司士掌朝儀之位秋官之屬也而治朝之位宰夫掌之泉府廩人倉人掌財用地官之屬也而貨賄之出入太府掌之內外朝之冗食地官稿人之職也而宮正內宰則又均其稍食王朝之服飾春官司服之職也而內司服至屨人則又掌其服飾之用自宰夫之下夏采之上六十官之內三百六十官之職錯綜而互見焉並建六典兼行六卿天下萬事凡有關於理亂安危之大者則無不合然在其掌握之中也蓋古者三公無官惟與天子坐而論道故設六卿以分主六典而三公實統之三公既兼冢宰則六卿之六典非冢宰而誰建邪此事權之所以合於一而國家所以無多門之政自漢以來則失之矣有三公又有九卿而丞相御史未嘗行九卿事觀武帝時桑𢎞羊等致利王溫舒之屬峻法倪寬等推文學九卿更進用事不關決於丞相而大臣之權盡去矣嗚呼人君之為天下如欲稽古正名而使事權之合於一茍舍周官未有不泛然無統者矣太平經國書卷一
