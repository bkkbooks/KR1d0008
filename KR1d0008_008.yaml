body:
  text: 太平經國書卷八宋鄭伯謙撰宫衛論宫正宫伯宿衛或問宫正掌兵衛宫伯掌郎衛而兵衛郎衛則皆統於太宰何也曰宿衛不統於太宰則內外之勢有所限隔而賢否之人無所決擇事權將分政令將下移而錯出其禍有不可勝言者曰信如是説則九兵皆宿衛也虎賁之虎士何以掌於司馬司𨽻之𨽻何以掌於司寇司寇猶有可諉者曰是掌外朝與京師四夷之兵耳若虎士八百人自六軍之外獨此為王之親兵乃不統於太宰而散於司馬何邪曰司馬亦聽命於太宰耳必散於司馬者內外雖不可以不相統而彼此之勢則不可以不相持是故兵衛掌於宫正而王之親兵與四夷之兵則掌於虎賁與司𨽻昔者西漢之世以期門羽林等為宫禁之親兵以衛尉掌宫門之屯兵而以城門校尉掌京師十二城門之屯兵及三輔所屬於中尉之兵所謂北軍蓋指環衛王宫在長安之內者言之所謂南軍蓋指十二城門及三輔屬中尉之兵在長安之外者言之及武帝增置八校之兵以中壘益北軍以長水池陽胡騎益南軍蓋北軍不出長安之外南軍不散在三輔之中八校則包南北軍在其中矣是故周勃安劉氏乃北軍制南軍之效劉屈氂發三輔近縣兵及長水宣曲胡騎入長安與太子戰乃南軍制北軍之效宋朝有閣門司皇城司又有殿前司皇城司有親從官數千人入內內侍省都都知與副都知同主判之殿前司有馬步軍殿前太尉獨統攝之是故皇城一司於內庭宿衛無不預者而獨宿直諸班禁衛則初無所統攝殿前一司雖統攝諸班禁衛而皇城之事亦恝然不相關是漢以南軍北軍相制而宋朝以皇城司殿前司相維持大抵皆祖周人之遺意而其所為不同者漢南北軍雖𨽻於三公而掌於太尉然皆以文屬而政令不行於其間國朝則皆統於樞府周則皆統於冡宰此所以逺過於漢也故嘗因是而考之以為周人宿衛之制其别有五而其所以為宿衛之政令者其因則有四蓋居則有宫中之徒役公卿大夫之士庶子以為環列腹心之衛若宫正宫伯之所掌是也出則有虎士八百人掌先後王而趨以卒伍視朝則在路門之右若虎賁氏之所掌是也奉輿馬督扈從視朝則在路門之左則有太僕以掌之所謂侍御僕從罔匪正人是也執其兵器服以衛王之門外朝在野外則守內列則有司𨽻以掌之所謂使其屬帥四夷之𨽻是也由是言之環列腹心之衛非兵衛在內而不出虎士之衛為重兵之衛王不出亦不行四翟之𨽻則以王之出而環衛諸門侍御僕從之役則以王之行而飭整騶從此宿衛之别也然環列腹心之衛則為尤重且急是故稽其功緒而糾其德行會其什伍而教其道藝所以勸之而使為善掌其糾禁而會其行事掌其政令而均其秩序頒其衣裘而時其誅賞所以警之而使不為惡去其淫怠與其竒邪之民所以不使放僻邪侈之失德以亂宫中之政令宫正均外朝之稍食內宰均內朝之稍食所以養人心之善而保護亷恥之風此宿衛之政令也夫以貴遊之子弟授之以八次八舍之職事以宫中之徒役而錯置於八次八舍之中既勸其為善又禁其為惡既不使之混淆又不使之喪廉恥若是則凡居王之左右前後凡備王之顧問應對者孰非直諒多聞之士哉君子學道則愛人小人學道則易使學問日新職業日修而王亦中心無為日見正事而聞正言也其餘凡係於宿衛之兵者則大司馬教之太僕正之司𨽻令之師氏帥之內外相統而彼此相持雖名為兵而不聞有一武夫悍卒放慢詭譎之人得以厠迹於其間者每觀成王之季吕伋掌虎賁之士非有宰臣之命則吕伋不敢以擅發召公雖得以制命非有二諸侯將命以往則召公亦不敢以專行不惟內外相制而內之夾階戺而立堂垂執劉鉞而止戈刃者則又無非冠冕士大夫是故春秋之際雖以僭竊之楚而環列之尹太師猶得以掌之是猶有太宰統宫正宫伯之意區區之曹荷戈與殳猶有賢者如候人之詩是德行道藝猶未有愧於宫正宫伯之所掌也乃若西漢之興雖祖周人之故意而定內外之制然已駁雜而不純矣雖然漢猶古也不惟南北軍𨽻於三公而衛尉光祿勳皆屬於丞相御史光祿勳嵗以四科考第郎從官凡更直執戟內謹門禁外充車騎者無非以經明行修者為之故當時諸吕之亂滕公除宫左右執戟不肯去代王入未央宫謁者執戟衛端門不得入其效亦略可觀矣自武帝使世家富人犯令而入朝者皆得補郎而郎選於是始衰自期門羽林佽飛之屬反𨽻於光祿勳以為天子私人而兵衛於是始變自宣帝又發羽林孤兒佽飛射士征西羌而禁衛始紛紛輕出光武以來其制益壞矣京師止置北軍而八校之兵併為五營南軍不復有焉中衛不掌京輔士卒城門不置屯兵郡國罷材官車騎之屯而衛尉不間更戌之士於是北軍分為宦官所領竇武誅宦官雖召會北軍五校士數千人未幾即散降王甫外既不足以制內而內之所存者又未嘗教之使知義焉魏普而降光祿勳不復居禁中士大夫不復與宫衛直閣帶刀變生肘腋唐興置左右金吾衛將軍掌宫中及京師之巡警烽堠凡翊衛及外府佽飛畨上者皆屬焉而文武於是判然兩塗德宗之世權移近習宦官握禁兵而廢立在其手矣反覆魏普李唐之亂參觀兩漢之盛衰吾然後知周官之制不可廢有宫正宫伯矣不可以無虎賁有虎賁矣不可無司𨽻有宫正宫伯與夫虎賁司𨽻之屬矣又不可無太宰以兼統之奉養論飲膳酒醬供帳或問膳夫而下主食飲膳羞之味甸師而下主禽獸魚鱉之獻酒正而下主酒漿醯醢之物宫人而下主官舍幕幄供帳之儀至於醫師之中又有食醫一官視羮醬食飲之齊均鹹酸辛苦之和會牛羊犬豕魚鴈之宜每一官而數人分焉一人而數事萃焉太宰總之又皆一切不會矣豈使之厲民以自養邪何其厚口體之奉而侈飲食服御之供也曰存我則蒼生可厚自安則國家可保人主之於天下總萬變財萬物而養萬民智慮以治之非受天下之備物則不足以養其知仁厚以安之非享天下之備味則不足以養其仁德音以化之非兼天下之備産則不足以養其德使其氣體衰而不充精神耗而不行則四肢不享於安適而耳目不足於聰明是以太宰之佐王將與之講論治道而經理邦國則內必有以養其心外必有以養其身以一人而治四海則必以四海而奉一人若夫奉養有節而交於萬物有道則自有九式存焉奢侈非所慮也故自飲食膳羞而言之則膳夫掌其名數無大過不及之失節庖人令其禽獸無腥臊膻香之失宜內饔掌內外饔掌外無割烹煎和之不備烹人掌給水火無美惡新舊之不謹甸師又以薪蒸而從於外內饗獸人漁人鱉人臘人又以鳥獸魚鱉而入於庖人辨四時所宜之物而順其調養察五行之有餘不足而助其休廢凡可以均平其氣體而衛護其生理者總之於膳夫不敢會也自酒漿醯醢而言之醯人王舉則共醯物六十甕醢人王舉則共醢實六十甕漿人共王之六飲酒人共王之三酒以至賔客之禮酒酒正共之王之燕飲酒酒正又共之凡所以祀鬼神而待賔客充饗禮而共燕飲者總之於酒正不敢會也自宫舍幕幄供帳而言之其在內也六寢以致其安掃除以致其潔執燭以致其明爐炭以致其溫帷幕幄帟以致其賁飾其在外也車宫則仰轅以為門壇壝宫則列戟以表門廡宫則共人以為門梐枑再重之説大次小次之張凡燕寢之居會同之舍所以壯威儀而肅供御者總之於宫人不敢不盡其飭也蓋宮舍幕帟帳御所以養王之外而酒醬醯醢食飲膳羞所以養王之內內之養其於食飲膳羞則尤致其詳焉切嘗論之王日一舉一太牢也朔月加食一等則二太牢也齋之日三舉則三太牢也蓋朔之聽政勞於常日於是而有加於常食祭祀將以致精眀之德自強於禮而交於鬼神不可以不備其養於是而又有加於朔食所任愈重所治愈大則其所養愈加厚誠以天下國家之本在身有堯舜禹湯文武之身而後有堯舜禹湯文武之功業也反覆膳夫一官其所以養至尊而助氣體之愛者一何其至也必品嘗食乃食所以謹其節必侑徹以樂所以導其和必奉膳而贊祭所以起其敬必受祭僕司士之福與摯所以養其德惟其然也是以居移其氣養移其體君父尊安心廣體胖耳目聰明血氣和平疾疢不作而民命國脈不失其所恃此太宰保護養成之本非深於性命之理而明於理亂安危之原者不能首慮及此也自漢以來失周公之意逺矣文帝以敦朴為天下先宫室苑囿車騎服御無所增益可也而何至身衣弋綈足履革舄夫人衣不曵地帷帳無文繡而集書囊為殿帷耶是非有供帳服御以養其外如掌次掌客之職也梁武帝斷禁魚肉牲牢不殺食惟糲飯會同惟菜𬞞變一瓜為數十種治一菜為數十味甚者日止一食羣臣曲宴未嘗奏樂而臺城之辱竟以不食而斃是非有日飲膳羞以養其內如膳夫以下漿人以上之職也夫先王之所以自奉惟喪荒札瘥則減膳徹樂敬天之變而與民同其憂其餘則未嘗過自貶薄蓋將以吾身為天下本而何至蕭然自敝其形神若此邪莫貴於天子莫富於四海夫豈不足以奉一人而所以利天下者顧豈在於計口腹四體之區區邪勞心者治人勞力者治於人治於人者食人此固天下之通義而克勤於邦克儉於家家固不可以施諸邦也夫使殫財以華其居盡美以飭其躬窮五味以爽其口此固失萬物之性至於肥甘不足養於口聲音不足養於耳采色不足視於目而便嬖不足使令於前則亦非所以為自厚其生也自待於菲薄而自敝於多事曰吾將以節儉化天下儒者又從而助之不知人之和氣沖然而甚微泊乎其易危知用而不知養吾身之不存而天下將誰與安哉需之象曰君子以飲食宴樂頤之象曰君子以慎言語節飲食飲食可節也而不可廢也天官一官吾固知謂自有九式者存何慮其不節邪玩易之象反覆膳夫以下之職事務以所養保育沖粹使身安而道隆當是時也將不獨一身之肥而已也天地萬物實有賴焉祭享論祭祀燕享忠厚或問太僕相王燕飲之法而獻主者何以屬膳夫鬱人鬯人和鬱鬯而實八尊者何以屬酒正司尊彛掌六尊六彛之位而朝事饋食之籩豆何以屬天官而為籩人大司徒掌六鄉六遂之土地而藉田千里何以在天官而有甸師以至外饔之割烹酒正之酒醴此皆主王之飲食而享士庶子享耆老孤子亦何以例責之使共邪曰先王之於祭祀賔客至嚴且重特設春官以掌之矣以為未足而互見於三百六十官之中合職聨事不可槩舉缺然不舉其事者蓋寡至於義相從而類相聚者則亦不得不聚至於一官如有膳夫之食飲膳羞甸師之果蓏薪蒸酒正之酒漿籩人醢人之醯醢均之為飲食耳事既連於彼則勢不容不散於此此數事之所以盡屬於膳夫以下也若夫敬上帝孝鬼神懷羣臣而恤老幼考其事而推見其忠厚之意則深有可論者矣先王之敬上帝非徒以自敬蓋將教民敬也孝宗廟非徒以自孝蓋將教民孝也燕羣臣享士庶子享耆老孤子非徒以自為忠厚亦將以教民忠厚也自武王克商之後歸馬放牛示天下不復用然後上自朝廷下至道路州巷搜狩軍旅而孝悌禮樂之道無不逹焉故祀明堂而民知孝朝覲然後諸侯知所以臣耕籍然後諸侯知所以敬食三老五更於太學袒而割牲執醬執爵然後諸侯知所以悌成王周公繼之此意亦有加焉夫四海之內各以其職來祭非不可以備水陸之産也而千畝之籍三推之禮必親耕以為祭以為弗自致焉則猶不祭也不惟齊盛而果蓏蕭茅之屬無非使甸師共之以明其為自致之物外既盡物則內因以盡忠以此率天下則耕者養者知觀而起敬起弟非復有不耕而祭無誠者人鬼之異趨死生存亡之殊塗非不可以出乎仁智之兩間也其餘庖人則必共祭祀之好羞凡祭先王先公之日必思其所嗜而羞其所好其於籩人醢人必有朝事之籩豆薦麷蕡韭菹之數以致其盛而象其朝時之所進而饋食之籩豆薦棗栗葵菹之類以偹其細而象其食時之所進其於烹人鹽人大羮之外必共鉶羮苦鹽之外必共散鹽不敢一於質而無文其於酒正明水之外必加五齊玄酒之外必加三酒不敢一於神而廢人事死如事生事亡如事存以此示天下則凡為人子者謹終追逺而民德皆歸於厚非復有致死而為不仁者燕羣臣嘉賔所以恩之也享士庶子所以任之也享耆老孤子所以報之也然分大嚴而情不接僕僕亟拜則非所以為養君子之道也膳夫為獻主則無降階再拜受爵之勞而有廩人繼粟庖人繼肉之恩矣禮太迫則歡不洽賔主百拜而禮酒止於三行則非所以使之醉酒而飽德也共其酒而無酌數則盡其情而極其歡未醉而威儀抑抑既醉而威儀怭怭矣夫外嚴於分而內則懷之以恩生蒙其力而死則恤其老幼仁之至義之盡也以此率天下則民篤於恩意而敬老慈幼非復有不近人情而背義忘本者矣嗟夫人同此心也心同此理也關節脈理實相通而相應故上老老則民興孝上恤孤而民不倍上尊賢而民勸善親親以睦友賢不棄不遺故舊則民德歸厚郊祀后稷以配天宗祀文王於明堂以配上帝則四海之內各以其職來祭由此言之飲膳非細事也烹庖薪蒸非賤役而酒漿醯醢非微物也膳夫以奉王王以事上帝鬼神燕羣臣嘉賔耆老孤幼推其有餘之養以興起其孝敬之心故治國如示諸掌者必在於明郊社禘嘗之禮義而忠臣嘉賔得盡其心者亦自夫既飲食之又幣帛以將之之餘也誰謂其為不急之務而不可以不嚴且重乎自此意不存而先王之官日為無用耕籍之官廢則郊社之義缺三望而不郊者有之矣酒漿醯醢之官廢則宗廟之禮虧去告朔之餼羊者有之矣膳夫不為獻主則亟饋未免犬馬之畜君臣之恩意薄矣邦國不享老幼則四百甲子未免泥塗之辱老成之典型墜矣上之人既無敬老慈幼之意無歡欣交接之情若是而欲天下國家之治人民風俗之厚成王周公之所難也且成王周公之事不惟其敬上帝孝鬼神懷羣臣而恤老幼有以曲盡乎人情而感動乎人心也八蠟之祭雖貓虎有功於人猶不忘報焉況其所當孝敬者乎至尊既祭之末不敢忘至賤之卑雖輝胞翟閽猶不敢不及焉況親愛如羣臣乎瘖聾跛躃斷者侏儒猶皆有常職以食乎上況於死政之老與其孤乎學者誠於此而求之則先王孝敬之誠忠厚之意所以曲盡乎人情而感動乎人心如膳夫以下數事又皆其所當為者太平經國書卷八
